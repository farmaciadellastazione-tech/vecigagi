    // ── Storage ───────────────────────────────────────────────────────────────
    const SK_VOC    = "qml_v10_vocabolario";
    const SK_STATS  = "qml_v10_stats";
    const SK_LINGUE = "qml_v10_lingue";
    const SK_FILTRI = "qml_v10_filtri";
    const SK_VOC_VER = "qml_v10_voc_version";

    const SK_RECORD_PERC = "qml_v10_record_perc";

    // Versione corrente del vocabolario — incrementa ad ogni aggiornamento
    const VOC_VERSION = 20;

    // Merge automatico: aggiunge voci mancanti dal default senza toccare i progressi
    function mergeVocabolario(salvato) {
      // Strategia sicura: parti sempre dal VOCABOLARIO_DEFAULT aggiornato
      // e reintegra solo le voci personalizzate aggiunte dall'utente
      // (quelle che NON esistono nel default, riconoscibili perché non hanno chiave nel default)
      const chiaviDefault = new Set(VOCABOLARIO_DEFAULT.map(wordKey));
      // Mantieni solo le voci custom dell'utente (non presenti nel default)
      const vociCustom = Array.isArray(salvato)
        ? salvato.filter(e => e && typeof e === 'object' && !chiaviDefault.has(wordKey(e)))
        : [];
      const merged = [...VOCABOLARIO_DEFAULT, ...vociCustom];
      saveJSON(SK_VOC, merged);
      return merged;
    }

    function caricaVocabolario() {
      try {
        const verSalvata = loadJSON(SK_VOC_VER, 0);
        const salvato = loadJSON(SK_VOC, null);
        if (!salvato) {
          saveJSON(SK_VOC_VER, VOC_VERSION);
          return VOCABOLARIO_DEFAULT;
        }
        if (verSalvata < VOC_VERSION) {
          const aggiornato = mergeVocabolario(salvato);
          saveJSON(SK_VOC_VER, VOC_VERSION);
          return aggiornato;
        }
        if (!Array.isArray(salvato) || salvato.length === 0) throw new Error("voc_invalid");
        return salvato;
      } catch(e) {
        // localStorage corrotto — reset automatico
        console.warn("LinguaeQuiz: reset localStorage.", e);
        try { localStorage.clear(); } catch(_) {}
        saveJSON(SK_VOC_VER, VOC_VERSION);
        return VOCABOLARIO_DEFAULT;
      }
    }

    function loadJSON(key,def){try{const s=localStorage.getItem(key);return s?JSON.parse(s):def;}catch{return def;}}
    function saveJSON(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch{}}

    function esportaProgressi(stats,vocabolario,lingue){
      const blob=new Blob([JSON.stringify({stats,vocabolario,lingue},null,2)],{type:"application/json"});
      const a=document.createElement("a");a.href=URL.createObjectURL(blob);
      a.download="quiz_progressi.json";a.click();URL.revokeObjectURL(a.href);
    }
    function importaProgressi(file,onDone){
      const r=new FileReader();
      r.onload=e=>{try{onDone(JSON.parse(e.target.result));}catch{alert(UI[localStorage.getItem("linguaUI")||"en"].filenonvalido);}};
      r.readAsText(file);

    // ── Ripetizione spaziata ──────────────────────────────────────────────────
    function wordKey(entry){return entry.it||entry.en||Object.values(entry).find(v=>typeof v==="string"&&v.trim());}
    function coppiaKey(entry,da,a){return wordKey(entry)+"__"+da+"__"+a;}
    function oggi(){const d=new Date();return new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();}
    function getCoppia(stats,key){return stats[key]||{livello:0,prossima:0};}
    function isScaduta(stats,key){return oggi()>=getCoppia(stats,key).prossima;}
    function isAppresa(stats,key){return getCoppia(stats,key).livello>=SOGLIA_APPRESA;}

    function aggiornaStatsCoppia(stats,key,corretto){
      const c=getCoppia(stats,key);
      // SM-2: risposta giusta avanza, sbagliata riporta a livello 1 (non 0, per non cancellare tutto)
      const nl=corretto ? Math.min(c.livello+1, LIVELLO_MAX) : Math.max(0, Math.min(c.livello-2, 1));
      const giorniAttesa=corretto ? INTERVALLI[nl] : 0;
      return {...stats,[key]:{livello:nl,prossima:oggi()+giorniAttesa*86400000,risposte:(c.risposte||0)+1,corrette:(c.corrette||0)+(corretto?1:0)}};
    }
    function labelProssima(stats,key){
      const c=getCoppia(stats,key);if(c.livello===0)return"Nuova";
      const d=Math.round((c.prossima-oggi())/86400000);
      const ui2=UI[localStorage.getItem("linguaUI")||"en"];if(d<=0)return ui2.oggi;if(d===1)return ui2.domani;return`+${d}g`;
    }
    function lingueAttiveEntry(entry,lingue){
      return lingue.filter(l=>l.attiva&&entry[l.codice]&&entry[l.codice].trim()!=="").map(l=>l.codice);
    }
    function parolaAppresa(entry,stats,lingue){
      const ld=lingueAttiveEntry(entry,lingue);if(ld.length<2)return false;
      const coppie=[];
      ld.forEach(da=>ld.forEach(a=>{if(da!==a)coppie.push(coppiaKey(entry,da,a));}));
      if(coppie.length===0)return false;
      const apprese=coppie.filter(k=>isAppresa(stats,k)).length;
      return apprese/coppie.length>=0.75;
    }
    function contaScadute(vocabolario,stats,lingue,filtri){
      let n=0;
      vocabolario.filter(e=>passaFiltri(e,filtri)).forEach(e=>{
        const ld=lingueAttiveEntry(e,lingue);
        ld.forEach(da=>ld.forEach(a=>{if(da!==a&&isScaduta(stats,coppiaKey(e,da,a)))n++;}));
      });
      return n;
    }

    function passaFiltri(entry,filtri){
      if(filtri.temi.length>0&&!filtri.temi.includes(entry.tema||"")) return false;
      if(filtri.livelli.length>0&&!filtri.livelli.includes(entry.livello||"A1")) return false;
      return true;
    }

    function estraiCarte(vocabolario,stats,lingue,filtri,linguaDaFissa,linguaAFissa,nonstop=false){
      const lingueAttive=lingue.filter(l=>l.attiva);
      const limite=nonstop?9999:QUIZ_LEN;
      const modalitaNS=["quiz","allenamento","ascolto"];
      const pool=vocabolario.filter(e=>passaFiltri(e,filtri));
      const sc=[],nu=[],ap=[];

      // ── Stima livello utente (media dei livelli SM-2 sulle parole viste) ──
      const livelliVisti=Object.values(stats).map(s=>s.livello||0).filter(l=>l>0);
      const livelloUtente=livelliVisti.length>0
        ? livelliVisti.reduce((a,b)=>a+b,0)/livelliVisti.length : 0;
      // Soglia CEFR adattiva: all'inizio solo A1, poi A1+A2, poi tutto
      const cefrMax = livelloUtente<1?"A1":livelloUtente<2?"A2":livelloUtente<4?"B1":"B2";
      const cefrOrdine=["A1","A2","B1","B2"];
      const cefrIdx=cefrOrdine.indexOf(cefrMax);
      function passaCEFR(e){ return cefrOrdine.indexOf(e.livello||"A1")<=cefrIdx; }

      // ── Parole normali ───────────────────────────────────────────────────
      pool.forEach(e=>{
        const ld=lingueAttiveEntry(e,lingue);if(ld.length<2)return;
        const daList=linguaDaFissa?ld.filter(c=>c===linguaDaFissa):ld;
        const aList=linguaAFissa?ld.filter(c=>c===linguaAFissa):ld;
        daList.forEach(da=>aList.forEach(a=>{
          if(da===a)return;
          const key=coppiaKey(e,da,a);const c=getCoppia(stats,key);
          const adatta=passaCEFR(e);
          // Priorità: scadute > nuove (CEFR adattato) > apprese (rare)
          const carta={entry:e,da,a,key,sottomodalita:nonstop?modalitaNS[Math.floor(Math.random()*modalitaNS.length)]:null};
          if(isScaduta(stats,key)&&c.livello>0)sc.push(carta);
          else if(c.livello===0&&adatta)nu.push(carta);
          else if(isAppresa(stats,key)&&Math.random()<0.03)ap.push(carta);
        }));
      });

      // ── Esercizi coniugazione ────────────────────────────────────────────
      const includiConiug = filtri.temi.length===0 || filtri.temi.includes("grammatica");
      if(includiConiug){
        const esercizi=generaEserciziConiugazioni(lingueAttive.filter(l=>LINGUE_CONIUG[l.codice]));
        esercizi.forEach(ez=>{
          if(linguaDaFissa&&ez.lDA.codice!==linguaDaFissa)return;
          if(linguaAFissa&&ez.lA.codice!==linguaAFissa)return;
          const c=getCoppia(stats,ez.key);
          if(isScaduta(stats,ez.key)&&c.livello>0)sc.push(ez);
          else if(c.livello===0&&livelloUtente>=1)nu.push(ez); // coniugazioni dopo le prime parole
          else if(isAppresa(stats,ez.key)&&Math.random()<0.03)ap.push(ez);
        });
      }

      // ── Ordinamento intelligente ─────────────────────────────────────────
      // Scadute: prima quelle più urgenti (prossima più lontana nel passato)
      sc.sort((a,b)=>{
        const ca=getCoppia(stats,a.key), cb=getCoppia(stats,b.key);
        return ca.prossima-cb.prossima; // più vecchie prima
      });
      // Nuove: ordina per CEFR poi mescola dentro ogni livello
      nu.sort((a,b)=>{
        const da=PESO_CEFR[a.entry.livello||"A1"], db=PESO_CEFR[b.entry.livello||"A1"];
        if(da!==db)return da-db;
        return Math.random()-0.5;
      });
      ap.sort(()=>Math.random()-0.5);

      // ── Composizione sessione con bilanciamento temi ──────────────────────
      const res=[],usateParola=new Set(),usateTemi={};
      const MAX_PER_TEMA=nonstop?999:3; // max 3 domande per tema nella stessa sessione
      function aggiungi(carta){
        if(res.length>=limite)return false;
        const wk=wordKey(carta.entry)+(carta.entry.tipo||"")+carta.da+carta.a;
        if(usateParola.has(wk))return false;
        const tema=carta.entry?.tema||"";
        if(!nonstop&&tema&&(usateTemi[tema]||0)>=MAX_PER_TEMA)return false;
        res.push(carta);
        usateParola.add(wk);
        usateTemi[tema]=(usateTemi[tema]||0)+1;
        return true;
      }
      // Prima passata: scadute + nuove con bilanciamento temi
      for(const c of sc)aggiungi(c);
      for(const c of nu)aggiungi(c);
      for(const c of ap)aggiungi(c);
      // Seconda passata: se non abbiamo ancora QUIZ_LEN, rimuovi limite tema
      if(res.length<limite&&!nonstop){
        const tutteOrdinatePerCEFR=[...sc,...nu,...ap];
        for(const c of tutteOrdinatePerCEFR){
          if(res.length>=limite)break;
          const wk=wordKey(c.entry)+(c.entry.tipo||"")+c.da+c.a;
          if(!usateParola.has(wk)){res.push(c);usateParola.add(wk);}
        }
      }
      return res;
    }

    // Converte numeri nel testo in parole nella lingua indicata
    function convertiNumeri(testo, bcp47) {
      // Mappa bcp47 → codice lingua
      const cod = bcp47 ? bcp47.split("-")[0].toLowerCase() : "it";
      const langMap = {it:"it",en:"en",fr:"fr",es:"es",pt:"pt",de:"de",la:"la",ia:"ia"};
      const lang = langMap[cod] || "it";
      return testo.replace(/\b(\d+)\b/g, (match) => {

    // Data una parola e una lingua, restituisce tutte le varianti omofone
    function getOmofoni(parola, bcp47) {
      const lang = bcp47 ? bcp47.split("-")[0].toLowerCase() : null;
      if(!lang || !OMOFONI[lang]) return [parola];
      const norm = parola.toLowerCase().trim();
      const gruppo = OMOFONI[lang].find(g => g.map(w=>w.toLowerCase()).includes(norm));
      return gruppo ? gruppo : [parola];
    }

    function normalizza(str){
      return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[-_]/g," ").replace(/[^a-z\s]/g,"").replace(/\s+/g," ").trim();
    }
    // Accetta sia "eat" che "to eat" per verbi inglesi
    function normalizzaEn(str){
      const n=normalizza(str);
      return n.startsWith("to ") ? n.slice(3) : n;
    }
    function isCorretta(atteso,dato,bcp47){
      const datoConv = bcp47 ? convertiNumeri(dato, bcp47) : dato;
      const isEn = bcp47 && bcp47.startsWith("en");
      const n = isEn ? normalizzaEn(datoConv) : normalizza(datoConv);
      if(!n)return false;
      const ops=atteso.split("/").map(s=>{
        const base=normalizza(s.replace(/\(.*?\)/g,"").trim());
        return isEn ? (base.startsWith("to ") ? base.slice(3) : base) : base;
      });
      const omofoniDato = bcp47 ? getOmofoni(datoConv.trim(), bcp47).map(w=>normalizza(w)) : [n];
      const candidati = isEn ? [n,...omofoniDato] : [n,...omofoniDato];
      return ops.some(op=>{
        if(!op)return false;
        // Confronto diretto
        if(op===n)return true;
        // Confronto con omofoni del dato
        if(candidati.includes(op))return true;
        // Confronto con omofoni dell'atteso
        const omofoniOp = bcp47 ? getOmofoni(op, bcp47).map(w=>normalizza(w)) : [op];
        if(omofoniOp.includes(n))return true;
        // Per parole molto brevi (≤4 lettere) tolleranza extra: accetta se n è contenuto in op o viceversa
        if(op.length<=4&&(op.includes(n)||n.includes(op)))return true;
        const paroleOp=op.split(/\s+/);
        const paroleN=n.split(/\s+/);
        if(paroleOp.length===1){
          return op.startsWith(n)||n.startsWith(op);
        } else {
          const corrette=paroleOp.filter((p,i)=>paroleN[i]&&(paroleN[i]===p||p.startsWith(paroleN[i])||paroleN[i].startsWith(p))).length;
          return corrette/paroleOp.length>=0.8;
        }
      });
    }

    const SR=window.SpeechRecognition||window.webkitSpeechRecognition||null;
    function useSpeechRecognition(bcp47,onResult){
      const [ascolto,setAscolto]=useState(false);
      const srRef=useRef(null);
      const avviaAscolto=useCallback(()=>{
        if(!SR){alert(UI[localStorage.getItem("linguaUI")||"en"].usachromemsg);return;}
        if(ascolto){srRef.current?.stop();return;}
        const sr=new SR();
        sr.lang=bcp47;sr.interimResults=false;sr.maxAlternatives=5;
        sr.onstart=()=>setAscolto(true);
        sr.onend=()=>setAscolto(false);
        sr.onerror=()=>setAscolto(false);
        sr.onresult=e=>{const t=Array.from(e.results[0]).map(r=>r.transcript);onResult(t);};
        srRef.current=sr;sr.start();
      },[bcp47,ascolto,onResult]);
      return{ascolto,avviaAscolto};
    }

    // ── Dettato: stessa lingua per domanda e risposta ────────────────────────
    // Dettato: senti e scrivi nella stessa lingua (da=a), la lingua B serve solo per mostrare la traduzione
    function estraiCarteDettato(vocabolario,stats,lingue,filtri,linguaDaFissa,linguaBFissa){
      const pool=vocabolario.filter(e=>passaFiltri(e,filtri));
      const sc=[],nu=[],ap=[];
      const lingueAttive=lingue.filter(l=>l.attiva);
      // La lingua dell'interfaccia è già conosciuta — escludi dalle domande del dettato
      const linguaUI=getUILang(); // es. "it" o "en"
      pool.forEach(e=>{
        const ld=lingueAttiveEntry(e,lingue);if(ld.length<1)return;
        // Se c'è una lingua fissa usa quella, altrimenti escludi la lingua UI
        const lingList=linguaDaFissa
          ? ld.filter(c=>c===linguaDaFissa&&c!==linguaUI)
          : ld.filter(c=>c!==linguaUI);
        lingList.forEach(codice=>{
          if(!e[codice]||e[codice].trim()==="")return;
          // La lingua B per la traduzione deve essere la lingua UI (quella che l'utente conosce)
          // Se la lingua UI non è disponibile per questa voce, usa la prima disponibile
          const altreDisp=ld.filter(c=>c!==codice&&(!linguaBFissa||c===linguaBFissa));
          const linguaB=linguaBFissa||(altreDisp.includes(linguaUI)?linguaUI:altreDisp[0])||null;
          const key=`dettato__${wordKey(e)}__${codice}`;
          const c=getCoppia(stats,key);
          const carta={entry:e,da:codice,a:codice,linguaB,key,tipo:"dettato"};
          if(c.livello===0)nu.push(carta);
          else if(isScaduta(stats,key))sc.push(carta);
          else if(isAppresa(stats,key)&&Math.random()<0.05)ap.push(carta);
        });
      });
      // CEFR adattivo anche per dettato
      const livelliVistiD=Object.values(stats).map(s=>s.livello||0).filter(l=>l>0);
      const livelloUtenteD=livelliVistiD.length>0?livelliVistiD.reduce((a,b)=>a+b,0)/livelliVistiD.length:0;
      const cefrMaxD=livelloUtenteD<1?"A1":livelloUtenteD<2?"A2":livelloUtenteD<4?"B1":"B2";
      const cefrOrdineD=["A1","A2","B1","B2"];
      const cefrIdxD=cefrOrdineD.indexOf(cefrMaxD);
      sc.sort((a,b)=>getCoppia(stats,a.key).prossima-getCoppia(stats,b.key).prossima);
      nu.sort((a,b)=>{
        const da=PESO_CEFR[a.entry.livello||"A1"],db=PESO_CEFR[b.entry.livello||"A1"];
        if(da!==db)return da-db; return Math.random()-0.5;
      });
      ap.sort(()=>Math.random()-0.5);
      const res=[],usate=new Set(),usateTemiD={};
      function aggiungiD(c){
        if(res.length>=QUIZ_LEN)return false;
        if(usate.has(c.key))return false;
        const tema=c.entry?.tema||"";
        if(tema&&(usateTemiD[tema]||0)>=3)return false;
        res.push(c);usate.add(c.key);usateTemiD[tema]=(usateTemiD[tema]||0)+1;
        return true;
      }
      for(const c of sc)aggiungiD(c);
      for(const c of nu)aggiungiD(c);
      for(const c of ap)aggiungiD(c);
      if(res.length<QUIZ_LEN){
        for(const c of[...sc,...nu,...ap]){
          if(res.length>=QUIZ_LEN)break;
          if(!usate.has(c.key)){res.push(c);usate.add(c.key);}
        }
      }
      return res;
    }
    // Ogni forma ha il soggetto separato dalla forma verbale pura
    // Formato: { p:"persona", it:"forma", fr:"forma", ... }
    // Le forme NON includono il soggetto (es. "amo" non "io amo", "aime" non "j'aime")
    const LINGUE_CONIUG = {
      it:  { nome:"Italiano",     bandiera:"🇮🇹" },
      fr:  { nome:"Francese",     bandiera:"🇫🇷" },
      es:  { nome:"Spagnolo",     bandiera:"🇪🇸" },
      pt:  { nome:"Portoghese",   bandiera:"🇵🇹" },
      la:  { nome:"Latino",       bandiera:"🏛" },

    // ── Pronomi soggetto per audio coniugazioni ─────────────────────────────
    // Chiave: "Nª sing/plur." — solo FR, EN, DE obbligatori; IT/ES/PT opzionali
    const SOGGETTI = {
      it:  { "1ª sing.":"io",   "2ª sing.":"tu",  "3ª sing.":"lui",   "1ª plur.":"noi",  "2ª plur.":"voi",  "3ª plur.":"loro" },
      fr:  { "1ª sing.":"je",   "2ª sing.":"tu",  "3ª sing.":"il",    "1ª plur.":"nous", "2ª plur.":"vous", "3ª plur.":"ils"  },
      es:  { "1ª sing.":"yo",   "2ª sing.":"tú",  "3ª sing.":"él",    "1ª plur.":"nosotros","2ª plur.":"vosotros","3ª plur.":"ellos" },
      pt:  { "1ª sing.":"eu",   "2ª sing.":"tu",  "3ª sing.":"ele",   "1ª plur.":"nós",  "2ª plur.":"vós",  "3ª plur.":"eles" },
      en:  { "1ª sing.":"I",    "2ª sing.":"you", "3ª sing.":"he",    "1ª plur.":"we",   "2ª plur.":"you",  "3ª plur.":"they" },

    // Genera esercizi dal database coniugazioni
    function generaEserciziConiugazioni(lingueAttive){
      const esercizi=[];
      // Filtra solo le lingue supportate nelle coniugazioni e attive
      const lingConiug=lingueAttive.filter(l=>LINGUE_CONIUG[l.codice]);
      Object.entries(CONIUGAZIONI).forEach(([verbKey,verbo])=>{
        Object.entries(verbo.tempi).forEach(([tempoKey,tempo])=>{
          tempo.forme.forEach(forma=>{
            lingConiug.forEach(lDA=>{
              if(!forma[lDA.codice])return;
              lingConiug.forEach(lA=>{
                if(lA.codice===lDA.codice||!forma[lA.codice])return;
                const key=`coniug__${verbKey}__${tempoKey}__${forma.p}__${lDA.codice}__${lA.codice}`;
                esercizi.push({
                  key, tipo:"coniugazione",
                  atteso: forma[lA.codice],
                  lDA, lA,
                  verbKey, tempoKey,
                  persona: forma.p,
                  entry:{ [lDA.codice]:forma[lDA.codice], [lA.codice]:forma[lA.codice] }
                });
              });
            });
          });
        });
      });
      return esercizi;
    }

    // ── Schermata Verbi ────────────────────────────────────────────────────────
    function SchermataVerbi({lingue, stats, onIndietro}){
      const ui=useUI();
      const lingueAttive=lingue.filter(l=>l.attiva&&LINGUE_CONIUG[l.codice]);
      const [verbeSel,setVerbeSel]=useState("amare");
      const [tempoSel,setTempoSel]=useState("presente");
      const verbo=CONIUGAZIONI[verbeSel];
      const tempo=verbo?.tempi[tempoSel];

      const coloriTempi={
        presente:"bg-sky-500",imperfetto:"bg-blue-500",
        futuro:"bg-purple-500",passato:"bg-orange-500",
        congiuntivo:"bg-pink-500",imperativo:"bg-red-500"
      };

      return(
        <div className="min-h-screen bg-gradient-to-br neutral-50 p-4">
          <div className="max-w-2xl mx-auto">
            <div className="flex items-center gap-3 mb-4">
              <button onClick={onIndietro} className="text-slate-500 hover:text-slate-300 text-2xl">←</button>
              <h2 className="text-xl font-bold text-slate-100">{ui.tabelleconiug}</h2>
            </div>

            {/* Selezione verbo */}
            <div className="flex gap-2 mb-3 flex-wrap">
              {Object.entries(CONIUGAZIONI).map(([k,v])=>(
                <button key={k} onClick={()=>{setVerbeSel(k);setTempoSel("presente");}}
                  className={`text-xs px-3 py-1.5 rounded-full font-medium transition ${verbeSel===k?"bg-neutral-800 text-white":"bg-zinc-900 text-slate-400 border border-zinc-700"}`}>
                  {v.nome.split(" / ")[0]}
                </button>
              ))}
            </div>

            {/* Selezione tempo */}
            <div className="flex gap-2 mb-4 flex-wrap">
              {Object.entries(verbo.tempi).map(([k,t])=>(
                <button key={k} onClick={()=>setTempoSel(k)}
                  className={`text-xs px-3 py-1.5 rounded-full font-medium text-white transition ${tempoSel===k?coloriTempi[k]||"bg-black0":"bg-neutral-300"}`}>
                  {t.nome}
                </button>
              ))}
            </div>

            {/* Tabella */}
            {tempo&&(
              <div className="bg-zinc-900 rounded-2xl shadow overflow-hidden">
                <div className={`${coloriTempi[tempoSel]||"bg-black0"} px-4 py-2`}>
                  <p className="text-white font-bold text-sm">{verbo.nome}</p>
                  <p className="text-white opacity-80 text-xs">{tempo.nome}</p>
                </div>
                <div className="overflow-x-auto">
                  <table className="w-full text-xs">
                    <thead>
                      <tr className="bg-black">
                        <th className="text-left px-3 py-2 text-slate-500 font-medium w-20">{ui.persona}</th>
                        {lingueAttive.map(l=>(
                          <th key={l.codice} className="px-3 py-2 text-slate-400 font-medium">
                            {l.bandiera} {l.nome}
                          </th>
                        ))}

    // ── Schermata Configurazione Quiz ─────────────────────────────────────────
    function ConfigurazioneQuiz({modalita,lingue,filtri,vocabolario,stats,onAvvia,onAnnulla}){
      const t=useUI();
      const lingueAttive=lingue.filter(l=>l.attiva);
      const [linguaDa,setLinguaDa]=useState("qualsiasi");
      const [linguaA,setLinguaA]=useState("qualsiasi");
      // Default domande: legge dalla memoria per questa modalità, altrimenti 5 o 10
      const ndomMem = loadJSON(SK_NDOM,{});
      const defaultNDom = ndomMem[modalita] || (["allenamento","voce","ascolto","dettato"].includes(modalita)?5:10);
      const [nDomande,setNDomande]=useState(defaultNDom);
      const iconaModalita={quiz:"🎯",allenamento:"🏋️",ascolto:"🎧",voce:"🎤"}[modalita]||"🎯";
      const nomeModalita={quiz:t.quiz,allenamento:t.allenamento,ascolto:t.ascolto,voce:t.voce,dettato:t.dettato,nonstop:t.nonstop}[modalita]||modalita;

      // Carica il record: miglior numero di domande completate al 100%
      const recKey = `perc_${modalita}_${linguaDa}_${linguaA}`;
      const recNDomBest = loadJSON(SK_RECORD_PERC,{})[recKey]||null;

      const coloreModalita={
        quiz:"from-sky-500 to-sky-600",
        allenamento:"from-amber-500 to-amber-600",
        ascolto:"from-purple-500 to-purple-600",
        voce:"from-pink-500 to-pink-600"
      }[modalita]||"from-sky-500 to-sky-600";

      // Calcola quante carte disponibili con i filtri attuali
      const carteDisp = (() => {
        const pool = vocabolario.filter(e=>passaFiltri(e,filtri));
        let n=0;
        pool.forEach(e=>{
          const ld=lingueAttiveEntry(e,lingue);if(ld.length<2)return;
          ld.forEach(da=>ld.forEach(a=>{
            if(da===a)return;
            if(linguaDa!=="qualsiasi"&&da!==linguaDa)return;
            if(linguaA!=="qualsiasi"&&a!==linguaA)return;
            n++;
          }));
        });
        return n;
      })();

      // Opzioni domande per modalità
      const conRipetizione=["allenamento","voce","ascolto","dettato"].includes(modalita);
      const isNS=modalita==="nonstop";
      // Con ripetizione: no illimitato; Quiz: con illimitato; Non-stop: nessuna scelta
      const opzioniDomande = conRipetizione?[5,10,15,20,30,50]:[5,10,15,20,30,50];

      return(
        <div className="min-h-screen bg-black flex items-center justify-center p-4">
          <div className="card p-6 max-w-sm w-full">
            {/* Header modalità */}
            <div className={`bg-gradient-to-r ${coloreModalita} rounded-xl p-4 text-white text-center mb-5`}>
              <div className="text-3xl mb-1">{iconaModalita}</div>
              <div className="font-bold text-lg">{nomeModalita}</div>
            </div>

            <h3 className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-3">{t.configurazionetxt}</h3>

            {/* Lingua domanda */}
            <div className="mb-4">
              <label className="text-xs text-slate-500 block mb-2">
                {modalita==="ascolto" ? t.sentola : t.vedola}
              </label>
              <div className="flex flex-wrap gap-2">
                <button onClick={()=>setLinguaDa("qualsiasi")}
                  className={`text-xs px-3 py-1.5 rounded-full font-medium transition ${linguaDa==="qualsiasi"?"bg-neutral-700 text-white":"bg-zinc-900 text-slate-400"}`}>
                  {t.qualsiasi}
                </button>
                {lingueAttive.map(l=>(
                  <button key={l.codice} onClick={()=>setLinguaDa(l.codice)}
                    className={`text-xs px-3 py-1.5 rounded-full font-medium transition ${linguaDa===l.codice?"bg-neutral-700 text-white":"bg-zinc-900 text-slate-400"}`}>
                    {l.bandiera} {l.nome}
                  </button>
                ))}
              </div>
            </div>

            {/* Lingua risposta - nascosta per dettato (stessa della domanda) */}
            {modalita!=="dettato"&&<div className="mb-4">
              <label className="text-xs text-slate-500 block mb-2">
                {modalita==="voce" ? t.rispondoin_voce : t.rispondoin}
              </label>
              <div className="flex flex-wrap gap-2">
                <button onClick={()=>setLinguaA("qualsiasi")}
                  className={`text-xs px-3 py-1.5 rounded-full font-medium transition ${linguaA==="qualsiasi"?"bg-neutral-700 text-white":"bg-zinc-900 text-slate-400"}`}>
                  {t.qualsiasi}
                </button>
                {lingueAttive.map(l=>(
                  <button key={l.codice} onClick={()=>setLinguaA(l.codice)}
                    className={`text-xs px-3 py-1.5 rounded-full font-medium transition ${linguaA===l.codice?"bg-neutral-700 text-white":"bg-zinc-900 text-slate-400"}`}>
                    {l.bandiera} {l.nome}
                  </button>
                ))}
              </div>
            </div>}

            {/* Numero domande - nascosto per nonstop */}
            {!isNS&&<div className="mb-4">
              <label className="text-xs text-slate-500 block mb-2">🔢 {t.ndomande}</label>
              <div className="flex flex-wrap gap-2">
                {opzioniDomande.map(n=>(
                  <button key={n} onClick={()=>setNDomande(n)}
                    className={`text-xs px-3 py-1.5 rounded-full font-medium transition ${nDomande===n?"bg-sky-500 text-white":"bg-zinc-900 text-slate-400 border border-zinc-700"}`}>
                    {n===0?t.illimitato:`${n}`}
                  </button>
                ))}
              </div>
              {recNDomBest!==null&&(
                <p className="text-xs text-amber-400 mt-2">🏅 Record: 100% su {recNDomBest} domande</p>
              )}
            </div>}

            {/* Info carte disponibili */}
            <div className={`text-center text-xs mb-4 py-2 px-3 rounded-xl ${carteDisp===0?"bg-red-50 text-red-400":"bg-black text-slate-500"}`}>
              {carteDisp===0
                ? t.nessunacombo
                : `${nDomande>0?Math.min(nDomande,carteDisp):carteDisp} ${t.combinazioni}`}
            </div>

            {/* Avviso verbi inglesi senza "to" */}
            {lingueAttive.some(l=>l.codice==="en")&&(
              <p className="text-xs text-zinc-600 text-center mb-3">{t.nota_verbi_en}</p>
            )}

            <div className="flex gap-3">
              <button onClick={onAnnulla} className="flex-1 border-2 border-zinc-700 text-slate-400 font-semibold py-3 rounded-xl">{t.indietrobtn}</button>
              <button onClick={()=>onAvvia(linguaDa==="qualsiasi"?null:linguaDa, modalita==="dettato"?(linguaDa==="qualsiasi"?null:linguaDa):linguaA==="qualsiasi"?null:linguaA, isNS?null:nDomande||null)}
                disabled={carteDisp===0}
                className={`flex-1 text-white font-semibold py-3 rounded-xl transition ${carteDisp===0?"bg-zinc-800 cursor-not-allowed":`bg-gradient-to-r ${coloreModalita}`}`}>
                {t.iniziabtn}
              </button>
            </div>
          </div>
        </div>
      );
    }

            <h3 className="text-lg font-bold text-slate-100 mb-4">✏️ Modifica parola</h3>
            <div className="flex gap-2 mb-4 flex-wrap">
              <div>
                <label className="text-xs text-slate-500 block mb-1">{t.tema}</label>

                  className="border-2 border-zinc-700 rounded-lg px-2 py-1 text-sm focus:outline-none focus:border-sky-400">

              <div>
                <label className="text-xs text-slate-500 block mb-1">{t.livello}</label>
                <select value={form.livello||"A1"} onChange={e=>setForm(f=>({...f,livello:e.target.value}))}
                  className="border-2 border-zinc-700 rounded-lg px-2 py-1 text-sm focus:outline-none focus:border-sky-400">
