    function mergeVocabolario(salvato) {
      const chiavi = new Set(salvato.map(wordKey));
      const nuove = VOCABOLARIO_DEFAULT.filter(e => !chiavi.has(wordKey(e)));
      if (nuove.length === 0) return salvato;
      const merged = [...salvato, ...nuove];
      saveJSON(SK_VOC, merged);
      return merged;
    }

    function caricaVocabolario() {
      const verSalvata = loadJSON(SK_VOC_VER, 0);
      const salvato = loadJSON(SK_VOC, null);
      if (!salvato) {
        // Prima volta — usa il default e salva la versione
        saveJSON(SK_VOC_VER, VOC_VERSION);
        return VOCABOLARIO_DEFAULT;
      }
      if (verSalvata < VOC_VERSION) {
        // Versione vecchia — aggiungi le voci mancanti silenziosamente
        const aggiornato = mergeVocabolario(salvato);
        saveJSON(SK_VOC_VER, VOC_VERSION);
        return aggiornato;
      }
      return salvato;
    }

    function loadJSON(key,def){try{const s=localStorage.getItem(key);return s?JSON.parse(s):def;}catch{return def;}}
    function saveJSON(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch{}}

    function esportaProgressi(stats,vocabolario,lingue){
      const blob=new Blob([JSON.stringify({stats,vocabolario,lingue},null,2)],{type:"application/json"});
      const a=document.createElement("a");a.href=URL.createObjectURL(blob);
      a.download="quiz_progressi.json";a.click();URL.revokeObjectURL(a.href);
    }
    function importaProgressi(file,onDone){
      const r=new FileReader();
      r.onload=e=>{try{onDone(JSON.parse(e.target.result));}catch{alert("File non valido.");}};
      r.readAsText(file);
    }

    // ── Ripetizione spaziata ──────────────────────────────────────────────────
    function wordKey(entry){return entry.it||entry.en||Object.values(entry).find(v=>typeof v==="string"&&v.trim());}
    function coppiaKey(entry,da,a){return wordKey(entry)+"__"+da+"__"+a;}
    function oggi(){const d=new Date();return new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();}
    function getCoppia(stats,key){return stats[key]||{livello:0,prossima:0};}
    function isScaduta(stats,key){return oggi()>=getCoppia(stats,key).prossima;}
    function isAppresa(stats,key){return getCoppia(stats,key).livello>=SOGLIA_APPRESA;}

    function aggiornaStatsCoppia(stats,key,corretto){
      const c=getCoppia(stats,key);
      const nl=corretto?Math.min(c.livello+1,SOGLIA_APPRESA):0;
      return {...stats,[key]:{livello:nl,prossima:corretto?oggi()+INTERVALLI[nl]*86400000:oggi()}};
    }
    function labelProssima(stats,key){
      const c=getCoppia(stats,key);if(c.livello===0)return"Nuova";
      const d=Math.round((c.prossima-oggi())/86400000);
      if(d<=0)return"Oggi";if(d===1)return"Domani";return`+${d}g`;
    }
    function lingueAttiveEntry(entry,lingue){
      return lingue.filter(l=>l.attiva&&entry[l.codice]&&entry[l.codice].trim()!=="").map(l=>l.codice);
    }
    function parolaAppresa(entry,stats,lingue){
      const ld=lingueAttiveEntry(entry,lingue);if(ld.length<2)return false;
      const coppie=[];
      ld.forEach(da=>ld.forEach(a=>{if(da!==a)coppie.push(coppiaKey(entry,da,a));}));
      if(coppie.length===0)return false;
      const apprese=coppie.filter(k=>isAppresa(stats,k)).length;
      return apprese/coppie.length>=0.75;
    }
    function contaScadute(vocabolario,stats,lingue,filtri){
      let n=0;
      vocabolario.filter(e=>passaFiltri(e,filtri)).forEach(e=>{
        const ld=lingueAttiveEntry(e,lingue);
        ld.forEach(da=>ld.forEach(a=>{if(da!==a&&isScaduta(stats,coppiaKey(e,da,a)))n++;}));
      });
      return n;
    }

    function passaFiltri(entry,filtri){
      if(filtri.temi.length>0&&!filtri.temi.includes(entry.tema||"")) return false;
      if(filtri.livelli.length>0&&!filtri.livelli.includes(entry.livello||"A1")) return false;
      return true;
    }

    function estraiCarte(vocabolario,stats,lingue,filtri,linguaDaFissa,linguaAFissa){
      const lingueAttive=lingue.filter(l=>l.attiva);
      const pool=vocabolario.filter(e=>passaFiltri(e,filtri));
      const sc=[],nu=[],ap=[];

      // Parole normali
      pool.forEach(e=>{
        const ld=lingueAttiveEntry(e,lingue);if(ld.length<2)return;
        const daList=linguaDaFissa?ld.filter(c=>c===linguaDaFissa):ld;
        const aList=linguaAFissa?ld.filter(c=>c===linguaAFissa):ld;
        daList.forEach(da=>aList.forEach(a=>{
          if(da===a)return;
          const key=coppiaKey(e,da,a);const c=getCoppia(stats,key);
          const carta={entry:e,da,a,key};
          if(c.livello===0)nu.push(carta);
          else if(isScaduta(stats,key))sc.push(carta);
          else if(isAppresa(stats,key)&&Math.random()<0.05)ap.push(carta);
        }));
      });

      // Esercizi coniugazione (inclusi se filtro grammatica attivo o nessun filtro tema)
      const includiConiug = filtri.temi.length===0 || filtri.temi.includes("grammatica");
      if(includiConiug){
        const esercizi=generaEserciziConiugazioni(lingueAttive.filter(l=>LINGUE_CONIUG[l.codice]));
        esercizi.forEach(ez=>{
          if(linguaDaFissa&&ez.lDA.codice!==linguaDaFissa)return;
          if(linguaAFissa&&ez.lA.codice!==linguaAFissa)return;
          const c=getCoppia(stats,ez.key);
          if(c.livello===0)nu.push(ez);
          else if(isScaduta(stats,ez.key))sc.push(ez);
          else if(isAppresa(stats,ez.key)&&Math.random()<0.05)ap.push(ez);
        });
      }
      [sc,nu,ap].forEach(g=>g.sort(()=>Math.random()-0.5));
      const res=[],usate=new Set();
      for(const g of[sc,nu,ap]){
        for(const c of g){
          if(res.length>=QUIZ_LEN)break;
          const d=wordKey(c.entry)+c.da+c.a;
          if(!usate.has(d)){res.push(c);usate.add(d);}
        }
        if(res.length>=QUIZ_LEN)break;
      }
      return res;
    }

    // ── Audio ─────────────────────────────────────────────────────────────────
    function parla(testo,bcp47){
      if(!window.speechSynthesis)return;
      window.speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(testo.replace(/\(.*?\)/g,"").replace(/\/.*/,"").trim());
      u.lang=bcp47;u.rate=0.85;window.speechSynthesis.speak(u);
    }
    function normalizza(str){
      return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z\s]/g,"").trim();
    }
    function isCorretta(atteso,dato){
      const n=normalizza(dato);if(!n)return false;
      const ops=atteso.split("/").map(s=>normalizza(s.replace(/\(.*?\)/g,"").trim()));
      return ops.some(op=>{
        if(op===n)return true;                          // corrispondenza esatta
        const paroleOp=op.split(/\s+/);
        const paroleN=n.split(/\s+/);
        if(paroleOp.length===1){
          // Parola singola: tolleranza su troncatura (es. "manducar" accetta "manduca")
          return op.startsWith(n)||n.startsWith(op);
        } else {
          // Frase: richiede almeno l'80% delle parole corrette nell'ordine giusto
          const corrette=paroleOp.filter((p,i)=>paroleN[i]&&(paroleN[i]===p||p.startsWith(paroleN[i])||paroleN[i].startsWith(p))).length;
          return corrette/paroleOp.length>=0.8;
        }
      });
    }

    const SR=window.SpeechRecognition||window.webkitSpeechRecognition||null;
    function useSpeechRecognition(bcp47,onResult){
      const [ascolto,setAscolto]=useState(false);
      const srRef=useRef(null);
      const avviaAscolto=useCallback(()=>{
        if(!SR){alert("Usa Chrome per il riconoscimento vocale.");return;}
        if(ascolto){srRef.current?.stop();return;}
        const sr=new SR();
        sr.lang=bcp47;sr.interimResults=false;sr.maxAlternatives=3;
        sr.onstart=()=>setAscolto(true);
        sr.onend=()=>setAscolto(false);
        sr.onerror=()=>setAscolto(false);
        sr.onresult=e=>{const t=Array.from(e.results[0]).map(r=>r.transcript);onResult(t);};
        srRef.current=sr;sr.start();
      },[bcp47,ascolto,onResult]);
      return{ascolto,avviaAscolto};
    }

    // ── Pannello Lingue ───────────────────────────────────────────────────────
    function PannelloLingue({lingue,onCambia,onChiudi}){
      const [nuovoNome,setNuovoNome]=useState("");
      const [nuovaBandiera,setNuovaBandiera]=useState("🌐");
      const [errore,setErrore]=useState("");
      function toggleAttiva(codice){
        const att=lingue.filter(l=>l.attiva).length;
        const lang=lingue.find(l=>l.codice===codice);
        if(lang.attiva&&att<=2){setErrore("Tieni almeno 2 lingue attive.");return;}
        setErrore("");onCambia(lingue.map(l=>l.codice===codice?{...l,attiva:!l.attiva}:l));
      }
      function aggiungiLingua(){
        const nome=nuovoNome.trim();if(!nome){setErrore("Inserisci il nome.");return;}
        const codice=nomeToCodice(nome);
        if(lingue.some(l=>l.codice===codice)){setErrore("Già presente.");return;}
        onCambia([...lingue,{codice,nome:nome.charAt(0).toUpperCase()+nome.slice(1),bandiera:nuovaBandiera,bcp47:getBCP47(nome),attiva:true}]);
        setNuovoNome("");setNuovaBandiera("🌐");setErrore("");
      }
      function rimuovi(codice){
        if(lingue.filter(l=>l.attiva).length<=2&&lingue.find(l=>l.codice===codice)?.attiva){setErrore("Tieni almeno 2 lingue attive.");return;}
        onCambia(lingue.filter(l=>l.codice!==codice));
      }
      return(
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
          <div className="card p-6 max-w-sm w-full max-h-screen overflow-y-auto">
            <div className="flex justify-between items-center mb-5">
              <h3 className="text-lg font-extrabold text-white">🌍 Lingue</h3>
              <button onClick={onChiudi} className="text-slate-500 hover:text-slate-300 text-xl">✕</button>
            </div>
            <div className="space-y-1 mb-5">
              {lingue.map(l=>(
                <div key={l.codice} className="flex items-center gap-2 p-2.5 rounded-xl hover:bg-black">
                  <span className="text-xl">{l.bandiera}</span>
                  <span className="flex-1 text-sm font-semibold text-slate-200">{l.nome}</span>
                  <button onClick={()=>toggleAttiva(l.codice)}
                    className={`text-xs px-3 py-1 rounded-lg font-bold transition ${l.attiva?"bg-sky-900 text-sky-600":"bg-zinc-900 text-slate-500"}`}>
                    {l.attiva?"ON":"OFF"}
                  </button>
                  <button onClick={()=>rimuovi(l.codice)} className="text-slate-700 hover:text-red-400 transition">🗑</button>
                </div>
              ))}
            </div>
            <div className="border-t border-zinc-800 pt-4">
              <p className="text-xs uppercase tracking-widest text-slate-500 mb-3">Aggiungi lingua</p>
              <div className="flex gap-1 mb-3 flex-wrap">
                {BANDIERE.map(b=>(<button key={b} onClick={()=>setNuovaBandiera(b)} className={`text-xl rounded-lg p-1 transition ${nuovaBandiera===b?"ring-2 ring-sky-400 bg-sky-950":""}`}>{b}</button>))}
              </div>
              <div className="flex gap-2">
                <input type="text" value={nuovoNome} onChange={e=>setNuovoNome(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&aggiungiLingua()}
                  placeholder="Es. Giapponese, Russo…"
                  className="flex-1 border-2 border-zinc-700 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-sky-400"/>
                <button onClick={aggiungiLingua} className="bg-sky-500 hover:bg-sky-600 text-white font-bold px-4 rounded-xl transition">➕</button>
              </div>
              {errore&&<p className="text-red-500 text-xs mt-2">{errore}</p>}
            </div>
          </div>
        </div>
      );
    }

    // ── Dettato: stessa lingua per domanda e risposta ────────────────────────
    function estraiCarteDettato(vocabolario,stats,lingue,filtri,linguaFissa){
      const pool=vocabolario.filter(e=>passaFiltri(e,filtri));
      const sc=[],nu=[],ap=[];
      pool.forEach(e=>{
        const ld=lingueAttiveEntry(e,lingue);if(ld.length<1)return;
        const lingList=linguaFissa?ld.filter(c=>c===linguaFissa):ld;
        lingList.forEach(codice=>{
          if(!e[codice]||e[codice].trim()==="")return;
          const key=`dettato__${wordKey(e)}__${codice}`;
          const c=getCoppia(stats,key);
          const carta={entry:e,da:codice,a:codice,key,tipo:"dettato"};
          if(c.livello===0)nu.push(carta);
          else if(isScaduta(stats,key))sc.push(carta);
          else if(isAppresa(stats,key)&&Math.random()<0.05)ap.push(carta);
        });
      });
      [sc,nu,ap].forEach(g=>g.sort(()=>Math.random()-0.5));
      const res=[],usate=new Set();
      for(const g of[sc,nu,ap]){
        for(const c of g){
          if(res.length>=QUIZ_LEN)break;
          if(!usate.has(c.key)){res.push(c);usate.add(c.key);}
        }
        if(res.length>=QUIZ_LEN)break;
      }
      return res;
    }

    // Genera esercizi dal database coniugazioni
    function generaEserciziConiugazioni(lingueAttive){
      const esercizi=[];
      // Filtra solo le lingue supportate nelle coniugazioni e attive
      const lingConiug=lingueAttive.filter(l=>LINGUE_CONIUG[l.codice]);
      Object.entries(CONIUGAZIONI).forEach(([verbKey,verbo])=>{
        Object.entries(verbo.tempi).forEach(([tempoKey,tempo])=>{
          tempo.forme.forEach(forma=>{
            lingConiug.forEach(lDA=>{
              if(!forma[lDA.codice])return;
              lingConiug.forEach(lA=>{
                if(lA.codice===lDA.codice||!forma[lA.codice])return;
                const key=`coniug__${verbKey}__${tempoKey}__${forma.p}__${lDA.codice}__${lA.codice}`;
                esercizi.push({
                  key, tipo:"coniugazione",
                  atteso: forma[lA.codice],
                  lDA, lA,
                  verbKey, tempoKey,
                  persona: forma.p,
                  entry:{ [lDA.codice]:forma[lDA.codice], [lA.codice]:forma[lA.codice] }
                });
              });
            });
          });
        });
      });
      return esercizi;
    }

    // ── Schermata Verbi ────────────────────────────────────────────────────────
    function SchermataVerbi({lingue, stats, onIndietro}){
      const lingueAttive=lingue.filter(l=>l.attiva&&LINGUE_CONIUG[l.codice]);
      const [verbeSel,setVerbeSel]=useState("amare");
      const [tempoSel,setTempoSel]=useState("presente");
      const verbo=CONIUGAZIONI[verbeSel];
      const tempo=verbo?.tempi[tempoSel];

      const coloriTempi={
        presente:"bg-sky-500",imperfetto:"bg-blue-500",
        futuro:"bg-purple-500",passato:"bg-orange-500",
        congiuntivo:"bg-pink-500",imperativo:"bg-red-500"
      };

      return(
        <div className="min-h-screen bg-gradient-to-br neutral-50 p-4">
          <div className="max-w-2xl mx-auto">
            <div className="flex items-center gap-3 mb-4">
              <button onClick={onIndietro} className="text-slate-500 hover:text-slate-300 text-2xl">←</button>
              <h2 className="text-xl font-bold text-slate-100">📐 Tabelle di coniugazione</h2>
            </div>

            {/* Selezione verbo */}
            <div className="flex gap-2 mb-3 flex-wrap">
              {Object.entries(CONIUGAZIONI).map(([k,v])=>(
                <button key={k} onClick={()=>{setVerbeSel(k);setTempoSel("presente");}}
                  className={`text-xs px-3 py-1.5 rounded-full font-medium transition ${verbeSel===k?"bg-neutral-800 text-white":"bg-zinc-900 text-slate-400 border border-zinc-700"}`}>
                  {v.nome.split(" / ")[0]}
                </button>
              ))}
            </div>

            {/* Selezione tempo */}
            <div className="flex gap-2 mb-4 flex-wrap">
              {Object.entries(verbo.tempi).map(([k,t])=>(
                <button key={k} onClick={()=>setTempoSel(k)}
                  className={`text-xs px-3 py-1.5 rounded-full font-medium text-white transition ${tempoSel===k?coloriTempi[k]||"bg-black0":"bg-neutral-300"}`}>
                  {t.nome}
                </button>
              ))}
            </div>

            {/* Tabella */}
            {tempo&&(
              <div className="bg-zinc-900 rounded-2xl shadow overflow-hidden">
                <div className={`${coloriTempi[tempoSel]||"bg-black0"} px-4 py-2`}>
                  <p className="text-white font-bold text-sm">{verbo.nome}</p>
                  <p className="text-white opacity-80 text-xs">{tempo.nome}</p>
                </div>
                <div className="overflow-x-auto">
                  <table className="w-full text-xs">
                    <thead>
                      <tr className="bg-black">
                        <th className="text-left px-3 py-2 text-slate-500 font-medium w-20">Persona</th>
                        {lingueAttive.map(l=>(
                          <th key={l.codice} className="px-3 py-2 text-slate-400 font-medium">
                            {l.bandiera} {l.nome}
                          </th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {tempo.forme.map((forma,i)=>(
                        <tr key={i} className={i%2===0?"bg-zinc-900":"bg-black"}>
                          <td className="px-3 py-2 text-slate-500 text-xs italic">{forma.p}</td>
                          {lingueAttive.map(l=>(
                            <td key={l.codice} className="px-3 py-2 text-slate-200 font-medium text-center">
                              {forma[l.codice]||<span className="text-slate-700">—</span>}
                            </td>
                          ))}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
            <p className="text-xs text-slate-500 text-center mt-4">Usa il quiz per esercitarti sulle forme</p>
          </div>
        </div>
      );
    }

        allenamento:"from-amber-500 to-amber-600",
        ascolto:"from-purple-500 to-purple-600",
        voce:"from-pink-500 to-pink-600"
      }[modalita]||"from-sky-500 to-sky-600";

      // Calcola quante carte disponibili con i filtri attuali
      const carteDisp = (() => {
        const pool = vocabolario.filter(e=>passaFiltri(e,filtri));
        let n=0;
        pool.forEach(e=>{
          const ld=lingueAttiveEntry(e,lingue);if(ld.length<2)return;
          ld.forEach(da=>ld.forEach(a=>{
            if(da===a)return;
            if(linguaDa!=="qualsiasi"&&da!==linguaDa)return;
            if(linguaA!=="qualsiasi"&&a!==linguaA)return;
            n++;
          }));
        });
        return n;
      })();

      return(
        <div className="min-h-screen bg-black flex items-center justify-center p-4">
          <div className="card p-6 max-w-sm w-full">
            {/* Header modalità */}
            <div className={`bg-gradient-to-r ${coloreModalita} rounded-xl p-4 text-white text-center mb-5`}>
              <div className="text-3xl mb-1">{iconaModalita}</div>
              <div className="font-bold text-lg">{nomeModalita}</div>
            </div>

            <h3 className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-3">Configurazione</h3>

            {/* Lingua domanda */}
            <div className="mb-4">
              <label className="text-xs text-slate-500 block mb-2">
                {modalita==="ascolto" ? "🔊 Sento la parola in…" : "📖 Vedo la parola in…"}
              </label>
              <div className="flex flex-wrap gap-2">
                <button onClick={()=>setLinguaDa("qualsiasi")}
                  className={`text-xs px-3 py-1.5 rounded-full font-medium transition ${linguaDa==="qualsiasi"?"bg-neutral-700 text-white":"bg-zinc-900 text-slate-400"}`}>
                  🔀 Qualsiasi
                </button>
                {lingueAttive.map(l=>(
                  <button key={l.codice} onClick={()=>setLinguaDa(l.codice)}
                    className={`text-xs px-3 py-1.5 rounded-full font-medium transition ${linguaDa===l.codice?"bg-neutral-700 text-white":"bg-zinc-900 text-slate-400"}`}>
                    {l.bandiera} {l.nome}
                  </button>
                ))}
              </div>
            </div>

            {/* Lingua risposta */}
            <div className="mb-5">
              <label className="text-xs text-slate-500 block mb-2">
                {modalita==="voce" ? "🎤 Rispondo in…" : "✏️ Rispondo in…"}
              </label>
              <div className="flex flex-wrap gap-2">
                <button onClick={()=>setLinguaA("qualsiasi")}
                  className={`text-xs px-3 py-1.5 rounded-full font-medium transition ${linguaA==="qualsiasi"?"bg-neutral-700 text-white":"bg-zinc-900 text-slate-400"}`}>
                  🔀 Qualsiasi
                </button>
                {lingueAttive.map(l=>(
                  <button key={l.codice} onClick={()=>setLinguaA(l.codice)}
                    className={`text-xs px-3 py-1.5 rounded-full font-medium transition ${linguaA===l.codice?"bg-neutral-700 text-white":"bg-zinc-900 text-slate-400"}`}>
                    {l.bandiera} {l.nome}
                  </button>
                ))}
              </div>
            </div>

            {/* Info carte disponibili */}
            <div className={`text-center text-xs mb-4 py-2 px-3 rounded-xl ${carteDisp===0?"bg-red-50 text-red-400":"bg-black text-slate-500"}`}>
              {carteDisp===0
                ? "⚠️ Nessuna carta disponibile con questa combinazione"
                : `${carteDisp} combinazioni disponibili`}
            </div>

            <div className="flex gap-3">
              <button onClick={onAnnulla} className="flex-1 border-2 border-zinc-700 text-slate-400 font-semibold py-3 rounded-xl">← Indietro</button>
              <button onClick={()=>onAvvia(linguaDa==="qualsiasi"?null:linguaDa, linguaA==="qualsiasi"?null:linguaA)}
                disabled={carteDisp===0}
                className={`flex-1 text-white font-semibold py-3 rounded-xl transition ${carteDisp===0?"bg-zinc-800 cursor-not-allowed":`bg-gradient-to-r ${coloreModalita}`}`}>
                Inizia →
              </button>
            </div>
          </div>
        </div>
      );
    }

    function Home({vocabolario,stats,lingue,filtri,onScegli,onVocabolario,onVerbi,onAggiungi,onEsporta,onImporta,onCambiaLingue,onCambiaFiltri}){
      const fileRef=useRef();
      const [mostraLingue,setMostraLingue]=useState(false);
      const [mostraFiltri,setMostraFiltri]=useState(false);
      const lingueAttive=lingue.filter(l=>l.attiva);
      const vocFiltrato=vocabolario.filter(e=>passaFiltri(e,filtri));
      const apprese=vocFiltrato.filter(e=>parolaAppresa(e,stats,lingue)).length;
      const scadute=contaScadute(vocabolario,stats,lingue,filtri);
      const filtriAttivi=filtri.temi.length+filtri.livelli.length;

      const modalitaBtn=[
        { key:"quiz",        title:"🎯 Quiz",             desc:"Scrivi la traduzione",             color:"bg-sky-500 hover:bg-sky-400 ring-2 ring-sky-400/30" },
        { key:"allenamento", title:"🏋️ Allenamento",      desc:"Le sbagliate ricompaiono",         color:"bg-amber-500 hover:bg-amber-400 ring-2 ring-amber-400/30" },
        { key:"ascolto",     title:"🎧 Ascolta e scrivi", desc:"Senti la parola e trascrivi",      color:"bg-purple-500 hover:bg-purple-400 ring-2 ring-purple-400/30" },
        { key:"voce",        title:"🎤 Risposta vocale",  desc:"Pronuncia la traduzione",          color:"bg-pink-500 hover:bg-pink-400 ring-2 ring-pink-400/30" },
        { key:"dettato",     title:"✍️ Dettato",          desc:"Senti e scrivi nella stessa lingua",color:"bg-emerald-600 hover:bg-emerald-500 ring-2 ring-emerald-400/30" },
      ];

      return(
        <div className="min-h-screen bg-black p-4 md:p-8">
          {mostraLingue&&<PannelloLingue lingue={lingue} onCambia={nl=>onCambiaLingue(nl)} onChiudi={()=>setMostraLingue(false)}/>}
          {mostraFiltri&&<PannelloFiltri filtri={filtri} onCambia={onCambiaFiltri} onChiudi={()=>setMostraFiltri(false)}/>}

          <div className="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">

            {/* Colonna sinistra: stato e config */}
            <div className="lg:col-span-1 space-y-5">
              <div className="card p-6 text-center">
                <h1 className="text-2xl font-extrabold text-white tracking-tight mb-1">LinguaeQuiz</h1>
                <p className="text-slate-500 text-xs mb-5">Il tuo trainer linguistico</p>
                <div className="bg-black rounded-2xl p-4 mb-4 border border-zinc-800">
                  <p className="text-4xl font-extrabold text-sky-600">{apprese}</p>
                  <p className="text-xs font-semibold text-slate-400 mt-1">Parole apprese su {vocFiltrato.length}</p>
                  <div className="mt-3"><BarraProgresso valore={apprese} max={vocFiltrato.length}/></div>
                </div>
                {scadute>0&&(
                  <div className="bg-amber-950 border-2 border-amber-700 rounded-xl p-3 text-amber-300 flex items-center gap-2 text-left">
                    <span className="text-2xl">🔔</span>
                    <div>
                      <p className="font-bold text-sm">{scadute} coppie da ripassare</p>
                      <p className="text-xs">È ora del ripasso spaziato!</p>
                    </div>
                  </div>
                )}
              </div>

              <div className="card p-5">
                <p className="text-xs uppercase tracking-widest text-slate-500 mb-3">Configurazione</p>
                <div className="flex gap-2 mb-4 flex-wrap">
                  <button onClick={()=>setMostraLingue(true)}
                    className="flex items-center gap-2 bg-zinc-900 hover:bg-zinc-800 transition px-3 py-2 rounded-xl text-sm font-medium text-slate-200">
                    🌎 {lingueAttive.length} Lingue &nbsp;{lingueAttive.map(l=>l.bandiera).join("")}
                  </button>
                  <button onClick={()=>setMostraFiltri(true)}
                    className={`flex items-center gap-2 transition px-3 py-2 rounded-xl text-sm font-medium ${filtriAttivi>0?"bg-sky-900 text-sky-300 hover:bg-sky-900":"bg-zinc-900 hover:bg-zinc-800 text-slate-200"}`}>
                    🎛️ {filtriAttivi>0?`${filtriAttivi} Filtri`:"Filtri"}
                  </button>
                </div>
                <div className="flex gap-2 pt-3 border-t border-zinc-800 flex-wrap">
                  <button onClick={onVocabolario} title="Vocabolario"    className="text-lg bg-zinc-900 hover:bg-zinc-800 p-2.5 rounded-xl transition">📚</button>
                  <button onClick={onVerbi}       title="Tabelle verbi"  className="text-lg bg-zinc-900 hover:bg-zinc-800 p-2.5 rounded-xl transition">📐</button>
                  <button onClick={onAggiungi}    title="Aggiungi parola"className="text-lg bg-zinc-900 hover:bg-zinc-800 p-2.5 rounded-xl transition">➕</button>
                  <button onClick={onEsporta}     title="Salva progressi"className="text-lg bg-zinc-900 hover:bg-zinc-800 p-2.5 rounded-xl transition">💾</button>
                  <button onClick={()=>fileRef.current.click()} title="Carica progressi" className="text-lg bg-zinc-900 hover:bg-zinc-800 p-2.5 rounded-xl transition">📂</button>
                </div>
              </div>
            </div>

            {/* Colonna destra: modalità quiz */}
            <div className="lg:col-span-2 card p-6">
              <h2 className="text-xl font-bold text-white mb-5">Scegli la modalità di studio</h2>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                {modalitaBtn.map(m=>(
                  <button key={m.key} onClick={()=>onScegli(m.key)}
                    className={`${m.color} text-white p-5 rounded-2xl transition text-left flex items-start gap-3 btn-shadow`}>
                    <div className="flex-1">
                      <div className="font-extrabold text-base">{m.title}</div>
                      <div className="text-xs opacity-90 mt-0.5">{m.desc}</div>
                    </div>
                    <span className="text-xl opacity-40 mt-0.5">→</span>
                  </button>
                ))}
              </div>
              <p className="text-center text-xs text-slate-600 mt-8">© {new Date().getFullYear()} Dino Storti · Tutti i diritti riservati</p>
            </div>
          </div>
          <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={e=>e.target.files[0]&&onImporta(e.target.files[0])}/>
        </div>
      );
    }

    // ── Modifica parola ───────────────────────────────────────────────────────
    function ModificaParola({entry,lingue,onSalva,onAnnulla}){
      const [form,setForm]=useState({...entry});
      return(
        <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 p-4">
          <div className="card p-6 max-w-md w-full max-h-screen overflow-y-auto">
            <h3 className="text-lg font-bold text-slate-100 mb-4">✏️ Modifica parola</h3>
            <div className="flex gap-2 mb-4 flex-wrap">
              <div>
                <label className="text-xs text-slate-500 block mb-1">Tema</label>
                <select value={form.tema||""} onChange={e=>setForm(f=>({...f,tema:e.target.value}))}
                  className="border-2 border-zinc-700 rounded-lg px-2 py-1 text-sm focus:outline-none focus:border-sky-400">
                  {Object.entries(TEMI).map(([k,v])=><option key={k} value={k}>{v.emoji} {v.label}</option>)}
                </select>
              </div>
              <div>
                <label className="text-xs text-slate-500 block mb-1">Livello</label>
                <select value={form.livello||"A1"} onChange={e=>setForm(f=>({...f,livello:e.target.value}))}
                  className="border-2 border-zinc-700 rounded-lg px-2 py-1 text-sm focus:outline-none focus:border-sky-400">
                  {Object.keys(LIVELLI).map(k=><option key={k} value={k}>{k}</option>)}
                </select>
              </div>
            </div>
            {lingue.map(l=>(
              (entry[l.codice]!==undefined||l.attiva)?(
                <div key={l.codice} className="mb-3">
                  <label className="text-xs uppercase tracking-widest text-slate-500 mb-1 block">{l.bandiera} {l.nome}</label>
                  <input type="text" value={form[l.codice]||""} onChange={e=>setForm(f=>({...f,[l.codice]:e.target.value}))}
                    placeholder={`In ${l.nome}…`} className="w-full border-2 border-zinc-700 rounded-xl px-4 py-2 text-slate-200 focus:outline-none focus:border-sky-400"/>
                </div>
              ):null
            ))}
            <div className="flex gap-3 mt-4">
              <button onClick={onAnnulla} className="flex-1 border-2 border-zinc-700 text-slate-400 font-semibold py-3 rounded-xl">Annulla</button>
              <button onClick={()=>onSalva(form)} className="flex-1 bg-sky-500 hover:bg-sky-600 text-white font-semibold py-3 rounded-xl">Salva</button>
            </div>
          </div>
        </div>
      );
    }

    // ── Form aggiunta ─────────────────────────────────────────────────────────
    function FormAggiunta({vocabolario,lingue,onSalva,onAnnulla}){
      const vuoto=lingue.reduce((acc,l)=>({...acc,[l.codice]:""}),{tema:"cibo",livello:"A1"});
      const [form,setForm]=useState(vuoto);
      const [errore,setErrore]=useState("");
      function handleSalva(){
        const comp=lingue.filter(l=>form[l.codice]&&form[l.codice].trim()!=="");
        if(comp.length<2){setErrore("Compila almeno 2 lingue.");return;}
        if(vocabolario.some(e=>comp.some(l=>normalizza(e[l.codice]||"")===normalizza(form[l.codice])))){setErrore("Parola già presente.");return;}
        onSalva(form);
      }
      return(
        <div className="min-h-screen bg-black flex items-center justify-center p-4">
          <div className="card p-8 max-w-md w-full">
            <h2 className="text-xl font-bold text-slate-100 mb-1">➕ Aggiungi parola</h2>
            <p className="text-sm text-slate-500 mb-4">Compila almeno 2 lingue</p>
            <div className="flex gap-3 mb-4">
              <div className="flex-1">
                <label className="text-xs text-slate-500 block mb-1">Tema</label>
                <select value={form.tema} onChange={e=>setForm(f=>({...f,tema:e.target.value}))}
                  className="w-full border-2 border-zinc-700 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-sky-400">
                  {Object.entries(TEMI).map(([k,v])=><option key={k} value={k}>{v.emoji} {v.label}</option>)}
                </select>
              </div>
              <div>
                <label className="text-xs text-slate-500 block mb-1">Livello</label>
                <select value={form.livello} onChange={e=>setForm(f=>({...f,livello:e.target.value}))}
                  className="border-2 border-zinc-700 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-sky-400">
                  {Object.keys(LIVELLI).map(k=><option key={k} value={k}>{k}</option>)}
                </select>
              </div>
            </div>
            {lingue.map(l=>(
              <div key={l.codice} className="mb-3">
                <label className="text-xs uppercase tracking-widest text-slate-500 mb-1 block">{l.bandiera} {l.nome}{!l.attiva&&<span className="text-slate-600"> (disattiva)</span>}</label>
                <input type="text" value={form[l.codice]||""} onChange={e=>setForm(f=>({...f,[l.codice]:e.target.value}))}
                  placeholder={`In ${l.nome}…`} className="w-full border-2 border-zinc-700 rounded-xl px-4 py-2 text-slate-200 focus:outline-none focus:border-sky-400"/>
              </div>
            ))}
            {errore&&<p className="text-red-400 text-sm mb-3">{errore}</p>}
            <div className="flex gap-3 mt-4">
              <button onClick={onAnnulla} className="flex-1 border-2 border-zinc-700 text-slate-400 font-semibold py-3 rounded-xl">Annulla</button>
              <button onClick={handleSalva} className="flex-1 bg-sky-500 hover:bg-sky-600 text-white font-semibold py-3 rounded-xl">Salva</button>
            </div>
          </div>
        </div>
      );
    }

    // ── Vocabolario ───────────────────────────────────────────────────────────
    function Vocabolario({vocabolario,stats,lingue,onElimina,onModifica,onIndietro}){
      const [filtro,setFiltro]=useState("tutte");
      const [temaFiltro,setTemaFiltro]=useState("");
      const [livelloFiltro,setLivelloFiltro]=useState("");
      const [modificando,setModificando]=useState(null);
      const lingueAttive=lingue.filter(l=>l.attiva);

      const filtrate=vocabolario.filter(e=>{
        if(filtro==="apprese"&&!parolaAppresa(e,stats,lingue))return false;
        if(filtro==="daImparare"&&parolaAppresa(e,stats,lingue))return false;
        if(temaFiltro&&e.tema!==temaFiltro)return false;
        if(livelloFiltro&&e.livello!==livelloFiltro)return false;
        return true;
      });

      return(
        <div className="min-h-screen bg-gradient-to-br neutral-50 p-4">
          {modificando!==null&&(
            <ModificaParola entry={vocabolario[modificando]} lingue={lingue}
              onSalva={form=>{onModifica(modificando,form);setModificando(null);}}
              onAnnulla={()=>setModificando(null)}/>
          )}
          <div className="max-w-2xl mx-auto">
            <div className="flex items-center gap-3 mb-4">
              <button onClick={onIndietro} className="text-slate-500 hover:text-slate-300 text-2xl">←</button>
              <h2 className="text-xl font-bold text-slate-100">📚 Vocabolario ({filtrate.length}/{vocabolario.length})</h2>
            </div>
            {/* Filtri rapidi */}
            <div className="flex gap-2 mb-3 flex-wrap">
              {[["tutte","Tutte"],["daImparare","Da imparare"],["apprese","Apprese ✓"]].map(([v,l])=>(
                <button key={v} onClick={()=>setFiltro(v)}
                  className={`text-xs px-3 py-1.5 rounded-full font-medium transition ${filtro===v?"bg-sky-500 text-white":"bg-zinc-900 text-slate-400 border border-zinc-700"}`}>{l}</button>
              ))}
            </div>
            <div className="flex gap-2 mb-4 flex-wrap">
              <select value={temaFiltro} onChange={e=>setTemaFiltro(e.target.value)}
                className="text-xs border border-zinc-700 rounded-lg px-2 py-1 text-slate-400 bg-zinc-900">
                <option value="">Tutti i temi</option>
                {Object.entries(TEMI).map(([k,v])=><option key={k} value={k}>{v.emoji} {v.label}</option>)}
              </select>
              <select value={livelloFiltro} onChange={e=>setLivelloFiltro(e.target.value)}
                className="text-xs border border-zinc-700 rounded-lg px-2 py-1 text-slate-400 bg-zinc-900">
                <option value="">Tutti i livelli</option>
                {Object.keys(LIVELLI).map(k=><option key={k} value={k}>{k}</option>)}
              </select>
            </div>
            <div className="space-y-3">
              {filtrate.map((entry,i)=>{
                const idxReale=vocabolario.indexOf(entry);
                const appresa=parolaAppresa(entry,stats,lingue);
                const lv=LIVELLI[entry.livello||"A1"];
                const tm=TEMI[entry.tema||""];
                return(
                  <div key={i} className={`bg-zinc-900 rounded-xl shadow p-4 border-l-4 ${appresa?"border-green-400":"border-transparent"}`}>
                    <div className="flex justify-between items-start mb-2">
                      <div className="flex-1">
                        <div className="flex gap-1 mb-1">
                          {lv&&<span className={`text-xs px-2 py-0.5 rounded-full font-medium ${lv.colore}`}>{lv.label}</span>}
                          {tm&&<span className="text-xs bg-zinc-900 text-slate-400 px-2 py-0.5 rounded-full">{tm.emoji} {tm.label}</span>}
                        </div>
                        <div className="flex flex-wrap gap-x-3 gap-y-1">
                          {lingue.filter(l=>entry[l.codice]).map(l=>(
                            <span key={l.codice} className={`text-sm ${!l.attiva?"opacity-40":""}`}>
                              <span className="text-slate-500">{l.bandiera}</span>{" "}
                              <span className="text-slate-200 font-medium">{entry[l.codice]}</span>
                            </span>
                          ))}
                        </div>
                      </div>
                      <div className="flex items-center gap-2 ml-2 flex-shrink-0">
                        {appresa&&<span className="text-xs bg-green-100 text-green-600 px-2 py-0.5 rounded-full">✓</span>}
                        <button onClick={()=>setModificando(idxReale)} className="text-slate-600 hover:text-sky-500 text-lg" title="Modifica">✏️</button>
                        <button onClick={()=>onElimina(idxReale)} className="text-slate-600 hover:text-red-400 text-lg" title="Elimina">🗑</button>
                      </div>
                    </div>
                    <div className="grid grid-cols-2 gap-1 mt-2">
                      {lingueAttive.flatMap(da=>lingueAttive.filter(a=>a.codice!==da.codice&&entry[da.codice]&&entry[a.codice]).map(a=>{
                        const key=coppiaKey(entry,da.codice,a.codice);
                        const c=getCoppia(stats,key);
                        const pct=Math.min(100,(c.livello/SOGLIA_APPRESA)*100);
                        const bc=c.livello>=SOGLIA_APPRESA?"bg-green-9500":isScaduta(stats,key)?"bg-orange-400":"bg-sky-400";
                        return(
                          <div key={da.codice+a.codice} className="flex items-center gap-1.5">
                            <span className="text-xs text-slate-500 w-10 flex-shrink-0">{da.bandiera}→{a.bandiera}</span>
                            <div className="flex-1 h-1.5 bg-zinc-900 rounded-full overflow-hidden">
                              <div className={`h-full rounded-full ${bc}`} style={{width:`${pct}%`}}/>
                            </div>
                            <span className="text-xs text-slate-600 w-10 text-right flex-shrink-0">{labelProssima(stats,key)}</span>
                          </div>
                        );
                      }))}
                    </div>
                  </div>
                );
              })}
              {filtrate.length===0&&<p className="text-center text-slate-500 py-8">Nessuna parola trovata con questi filtri.</p>}
            </div>
          </div>
        </div>
      );
    }

    // ── Input vocale ──────────────────────────────────────────────────────────
    function InputVocale({bcp47,lingaNome,onVerifica}){
      const [trascritto,setTrascritto]=useState("");
      const [statoMic,setStatoMic]=useState("idle");
      const onResult=useCallback(testi=>{
        setStatoMic("elaborazione");
        const t=testi[0]||"";setTrascritto(t);
        setTimeout(()=>onVerifica(t),300);
      },[onVerifica]);
      const{ascolto,avviaAscolto}=useSpeechRecognition(bcp47,onResult);
      useEffect(()=>setStatoMic(ascolto?"ascolto":"idle"),[ascolto]);
      return(
        <div className="text-center bg-black rounded-2xl border-2 border-zinc-800 p-6">
          <p className="text-sm text-slate-400 mb-5">Pronuncia ad alta voce in <strong>{lingaNome}</strong></p>
          <button onClick={avviaAscolto}
            className={`w-28 h-28 mx-auto rounded-full text-5xl flex items-center justify-center transition-all shadow-lg
              ${statoMic==="ascolto"?"bg-red-500 text-white animate-pulse scale-110":"bg-pink-500 hover:bg-pink-600 text-white btn-shadow"}`}>
            {statoMic==="ascolto"?"⏹":"🎤"}
          </button>
          {statoMic==="ascolto"&&<p className="text-sm text-red-600 mt-4 font-bold animate-pulse">In ascolto… Parla ora</p>}
          {statoMic==="elaborazione"&&<p className="text-sm text-slate-400 mt-4 italic">Ho sentito: "{trascritto}"</p>}
          {statoMic==="idle"&&!trascritto&&<p className="text-xs text-slate-500 mt-4">Tocca il microfono per rispondere</p>}
          {!SR&&<p className="text-xs text-red-500 mt-3 font-medium">⚠️ Riconoscimento vocale solo su Chrome</p>}
        </div>
      );
    }

    // ── Schermata Quiz ────────────────────────────────────────────────────────
    function SchermataQuiz({carta,indice,totale,punteggio,stato,input,setInput,modalita,stats,lingue,onVerifica,onAvanti,onSalta,onNonLoSo,onSegnalaErrore,onHome,nuoveApprese,fine,onAvviaAncora}){
      const inputRef=useRef(null);
      const lDA = carta?.tipo==="coniugazione" ? carta.lDA : lingue.find(l=>l.codice===carta?.da);
      const lA  = carta?.tipo==="coniugazione" ? carta.lA  : lingue.find(l=>l.codice===carta?.a);
      const livello=carta?getCoppia(stats,carta.key).livello:0;
      const isRipasso=carta?isAppresa(stats,carta.key):false;
      const lv=carta?LIVELLI[carta.entry.livello||"A1"]:null;
      const tm=carta?TEMI[carta.entry.tema||""]:null;

      useEffect(()=>{
        // Pronuncia automatica in TUTTE le modalità
        if(carta&&stato==="domanda"&&lDA){
          const testo = carta.tipo==="coniugazione" ? carta.entry[lDA.codice] : carta.entry[carta.da];
          if(testo) setTimeout(()=>parla(testo,lDA.bcp47),400);
        }
      },[carta?.key,stato]);

      useEffect(()=>{
        if(stato==="domanda"&&inputRef.current&&modalita!=="voce"&&modalita!=="dettato")inputRef.current.focus();
      },[stato,carta?.key]);

      // Enter globale: su PC conferma anche Continua/Ho capito
      useEffect(()=>{
        function handleKey(e){
          if(e.key!=="Enter")return;
          if(stato==="corretto"||stato==="sbagliato") onAvanti();
        }
        window.addEventListener("keydown",handleKey);
        return()=>window.removeEventListener("keydown",handleKey);
      },[stato,onAvanti]);

      const coloreModalita={quiz:"bg-sky-900 text-sky-300",allenamento:"bg-amber-900 text-amber-300",ascolto:"bg-purple-900 text-purple-300",voce:"bg-pink-900 text-pink-300",dettato:"bg-green-900 text-green-300"}[modalita]||"bg-sky-900 text-sky-300";
      const iconaModalita={quiz:"🎯",allenamento:"🏋️",ascolto:"🎧",voce:"🎤",dettato:"✍️"}[modalita]||"🎯";

      if(fine||!carta){
        const tot=punteggio.giusti+punteggio.sbagliati;
        const perc=tot>0?Math.round((punteggio.giusti/tot)*100):0;
        return(
          <div className="min-h-screen bg-zinc-900 flex items-center justify-center p-4">
            <div className="card p-10 max-w-md w-full text-center">
              <div className="text-6xl mb-4">🏆</div>
              <h2 className="text-3xl font-extrabold text-white tracking-tight mb-1">Ottimo lavoro!</h2>
              <p className="text-slate-500 text-sm mb-8">{iconaModalita} Sessione completata</p>
              <div className="grid grid-cols-3 gap-4 bg-black rounded-2xl p-5 mb-6 border border-zinc-800">
                <div><div className="text-4xl font-extrabold text-green-500">{punteggio.giusti}</div><div className="text-xs font-semibold text-green-700 uppercase mt-1">Corrette</div></div>
                <div><div className="text-4xl font-extrabold text-red-500">{punteggio.sbagliati}</div><div className="text-xs font-semibold text-red-700 uppercase mt-1">Errori</div></div>
                <div><div className="text-4xl font-extrabold text-sky-500">{perc}%</div><div className="text-xs font-semibold text-sky-300 uppercase mt-1">Precisione</div></div>
              </div>
              {nuoveApprese.length>0&&(
                <div className="bg-green-950 border-2 border-green-800 rounded-2xl p-4 mb-6 text-sm text-green-300 text-left">
                  <span className="font-bold">✨ Nuove parole apprese:</span> {nuoveApprese.map(k=>k.split("(")[0].trim()).join(", ")}
                </div>
              )}
              <div className="flex gap-4">
                <button onClick={onHome} className="flex-1 bg-zinc-900 hover:bg-zinc-800 text-slate-200 font-bold py-3.5 rounded-xl transition">🏠 Home</button>
                <button onClick={onAvviaAncora} className="flex-1 bg-sky-500 hover:bg-sky-600 text-white font-bold py-3.5 rounded-xl transition btn-shadow">🔁 Ancora</button>
              </div>
            </div>
          </div>
        );
      }

      return(
        <div className="min-h-screen bg-zinc-900 flex items-center justify-center p-4">
          <div className="card p-6 max-w-xl w-full">
            {/* Header */}
            <div className="flex justify-between items-center mb-5 text-sm">
              <span className="font-bold text-white bg-zinc-900 px-3 py-1 rounded-full">{indice+1} / {totale}</span>
              <div className="flex gap-2 items-center">
                <span className={`text-xs px-2.5 py-1 rounded-full font-bold ${coloreModalita}`}>{iconaModalita}</span>
                {lv&&<span className={`text-xs px-2.5 py-1 rounded-full font-semibold ${lv.colore}`}>{lv.label}</span>}
              </div>
              <button onClick={onHome} className="text-slate-500 hover:text-red-500 transition text-lg font-bold">✕</button>
            </div>
            <BarraProgresso valore={indice} max={totale}/>
            {/* Tacche progresso ripetizione spaziata */}
            <div className="flex justify-center gap-1.5 mt-3 mb-1">
              {INTERVALLI.map((_,i)=>(
                <div key={i} className={`h-2 rounded-full transition-all ${
                  i<livello ? "bg-sky-400 w-6" :
                  i===livello&&livello<SOGLIA_APPRESA ? "bg-sky-800 w-6 border border-sky-600" :
                  "bg-zinc-800 w-4"
                }`}/>
              ))}
              {livello>=SOGLIA_APPRESA&&<span className="text-xs text-sky-400 font-bold ml-1">✓</span>}
            </div>

            {/* Scheda domanda */}
            <div className="mt-6 mb-6 p-5 bg-black rounded-2xl border border-zinc-800 relative">
              {tm&&<div className="absolute -top-3 left-1/2 -translate-x-1/2"><span className="text-xs bg-zinc-900 border border-zinc-800 text-slate-400 px-3 py-1 rounded-full shadow-sm">{tm.emoji} {tm.label}</span></div>}
              {isRipasso&&<div className="absolute top-3 right-3"><span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-bold">✓ Ripasso</span></div>}

              {carta.tipo==="coniugazione" ? (
                <div className="text-center pt-2">
                  <div className="bg-indigo-950 border border-indigo-800 rounded-xl p-2 mb-3">
                    <p className="text-indigo-300 font-bold text-sm">{CONIUGAZIONI[carta.verbKey]?.nome}</p>
                    <p className="text-indigo-400 text-xs">{CONIUGAZIONI[carta.verbKey]?.tempi[carta.tempoKey]?.nome} · <span className="italic font-medium">{carta.persona}</span></p>
                  </div>
                  <div className="flex items-center justify-center gap-2 mb-1">
                    <span className="text-2xl">{lDA?.bandiera}</span>
                    <span className="text-xs uppercase tracking-widest text-slate-500 font-medium">{lDA?.nome}</span>
                  </div>
                  <div className="flex items-center justify-center gap-2 mb-4">
                    <p className="text-4xl font-extrabold text-white">{carta.entry[lDA?.codice]}</p>
                    {lDA&&<BtnAudio testo={carta.entry[lDA.codice]} bcp47={lDA.bcp47} size="text-2xl"/>}
                  </div>
                  <div className="flex items-center justify-center gap-2 text-slate-600">
                    <span>↓ Traduci in ↓</span>
                  </div>
                  <div className="flex items-center justify-center gap-2 mt-2">
                    <span className="text-2xl">{lA?.bandiera}</span>
                    <span className="text-xs uppercase tracking-widest text-slate-400 font-bold">{lA?.nome}</span>
                  </div>
                </div>
              ) : carta.tipo==="dettato" ? (
                <div className="text-center pt-2">
                  <div className="bg-green-950 border border-green-800 rounded-xl p-2 mb-3">
                    <p className="text-green-400 text-xs font-semibold">✍️ Dettato — ascolta e scrivi</p>
                  </div>
                  <div className="flex items-center justify-center gap-2 mb-4">
                    <span className="text-2xl">{lDA?.bandiera}</span>
                    <span className="text-xs uppercase tracking-widest text-slate-500 font-medium">{lDA?.nome}</span>
                  </div>
                  <button onClick={()=>parla(carta.entry[carta.da],lDA?.bcp47)}
                    className="mx-auto flex items-center gap-2 bg-green-900 hover:bg-green-800 text-green-300 font-bold px-6 py-3 rounded-2xl transition text-lg border border-green-700">
                    🔊 Riascolta
                  </button>
                  <p className="text-slate-600 text-xs mt-3">Scrivi la parola che hai sentito</p>
                </div>
              ) : modalita==="ascolto" ? (
                <div className="text-center pt-2">
                  <div className="flex items-center justify-center gap-2 mb-3">
                    <span className="text-2xl">{lDA?.bandiera}</span>
                    <span className="text-xs uppercase tracking-widest text-slate-500 font-medium">{lDA?.nome}</span>
                  </div>
                  <button onClick={()=>parla(carta.entry[carta.da],lDA?.bcp47)}
                    className="mx-auto flex items-center gap-2 bg-purple-900 hover:bg-purple-800 text-purple-300 font-bold px-6 py-3 rounded-2xl transition text-lg border border-purple-700">
                    🔊 Riascolta
                  </button>
                  <div className="flex items-center justify-center gap-2 text-slate-600 mt-4">
                    <span>↓ Traduci in ↓</span>
                  </div>
                  <div className="flex items-center justify-center gap-2 mt-2">
                    <span className="text-2xl">{lA?.bandiera}</span>
                    <span className="text-xs uppercase tracking-widest text-slate-400 font-bold">{lA?.nome}</span>
                  </div>
                </div>
              ):(
                <div className="text-center pt-2">
                  <div className="flex items-center justify-center gap-2 mb-2">
                    <span className="text-2xl">{lDA?.bandiera}</span>
                    <span className="text-xs uppercase tracking-widest text-slate-500 font-medium">{lDA?.nome}</span>
                  </div>
                  <div className="flex items-center justify-center gap-3 mb-5">
                    <p className="text-4xl font-extrabold text-white tracking-tight">{carta.entry[carta.da]}</p>
                    {lDA&&<BtnAudio testo={carta.entry[carta.da]} bcp47={lDA.bcp47} size="text-2xl"/>}
                  </div>
                  <div className="flex items-center justify-center gap-2 text-slate-600">
                    <span>↓ Traduci in ↓</span>
                  </div>
                  <div className="flex items-center justify-center gap-2 mt-2">
                    <span className="text-2xl">{lA?.bandiera}</span>
                    <span className="text-xs uppercase tracking-widest text-slate-400 font-bold">{lA?.nome}</span>
                  </div>
                </div>
              )}
            </div>

            {stato==="domanda"&&(modalita==="quiz"||modalita==="allenamento"||modalita==="ascolto"||modalita==="dettato")&&(
              <div>
                <input ref={inputRef} type="text" value={input} onChange={e=>setInput(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&onVerifica(input)}
                  placeholder={modalita==="dettato"?`Scrivi in ${lDA?.nome}…`:`Scrivi in ${lA?.nome}…`}
                  className="w-full border-2 border-zinc-700 rounded-2xl px-5 py-4 text-lg text-slate-100 focus:outline-none focus:border-sky-400 mb-4 transition"/>
                <button onClick={()=>onVerifica(input)} className="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-4 rounded-2xl transition btn-shadow text-lg mb-3">
                  Conferma risposta <span className="text-xs opacity-60 ml-1">↵ Enter</span>
                </button>
                <div className="flex gap-3">
                  <button onClick={onSalta} className="flex-1 border-2 border-zinc-700 text-slate-400 hover:bg-zinc-900 font-semibold py-2.5 rounded-xl text-sm transition">⏭ Salta</button>
                  <button onClick={onNonLoSo} className="flex-1 border-2 border-amber-700 text-amber-400 hover:bg-amber-950 font-semibold py-2.5 rounded-xl text-sm transition">💡 Non lo so</button>
                </div>
              </div>
            )}

            {stato==="domanda"&&modalita==="voce"&&lA&&(
              <div className="space-y-3">
                <InputVocale bcp47={lA.bcp47} lingaNome={lA.nome} onVerifica={onVerifica}/>
                <div className="flex gap-3">
                  <button onClick={onSalta} className="flex-1 border-2 border-zinc-700 text-slate-400 hover:bg-zinc-900 font-semibold py-2.5 rounded-xl text-sm transition">⏭ Salta</button>
                  <button onClick={onNonLoSo} className="flex-1 border-2 border-amber-700 text-amber-400 hover:bg-amber-950 font-semibold py-2.5 rounded-xl text-sm transition">💡 Non lo so</button>
                </div>
              </div>
            )}

            {stato==="corretto"&&(
              <div className="p-5 bg-green-950 border-2 border-green-800 rounded-2xl text-center">
                <div className="text-5xl mb-3">✅</div>
                <p className="text-green-400 font-extrabold text-xl mb-1">Eccellente!</p>
                <p className="text-xs text-slate-500 mb-3">Prossimo ripasso: <span className="font-semibold text-slate-300">{labelProssima(stats,carta.key)}</span></p>
                <div className="flex items-center justify-center gap-2 bg-black px-4 py-2 rounded-full border border-green-800 mb-5">
                  <p className="text-slate-400 text-sm">Risposta: <span className="font-bold text-white">{carta.tipo==="coniugazione"?carta.atteso:carta.entry[carta.a]}</span></p>
                  {lA&&<BtnAudio testo={carta.tipo==="coniugazione"?carta.atteso:carta.entry[carta.a]} bcp47={lA.bcp47}/>}
                </div>
                <button onClick={onAvanti} onKeyDown={e=>e.key==="Enter"&&onAvanti()} className="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-2xl transition text-lg mb-2">
                  Continua → <span className="text-xs opacity-60 ml-1">↵</span>
                </button>
                <button onClick={onSegnalaErrore} className="w-full text-xs text-slate-600 hover:text-amber-500 transition py-1">⚠️ Segnala errore</button>
              </div>
            )}
            {stato==="sbagliato"&&(
              <div className="p-5 bg-red-950 border-2 border-red-800 rounded-2xl text-center">
                <div className="text-5xl mb-3">❌</div>
                <p className="text-red-400 font-extrabold text-xl mb-1">{modalita==="allenamento"?"Riproveremo!":"Non proprio…"}</p>
                <p className="text-slate-400 text-sm mb-3">Hai scritto: <span className="font-semibold text-slate-200">{input}</span></p>
                <div className="flex items-center justify-center gap-2 bg-black px-4 py-2 rounded-full border border-red-800 mb-5">
                  <p className="text-slate-400 text-sm">Corretta: <span className="font-bold text-sky-400">{carta.tipo==="coniugazione"?carta.atteso:carta.entry[carta.a]}</span></p>
                  {lA&&<BtnAudio testo={carta.tipo==="coniugazione"?carta.atteso:carta.entry[carta.a]} bcp47={lA.bcp47}/>}
                </div>
                <button onClick={onAvanti} onKeyDown={e=>e.key==="Enter"&&onAvanti()} className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-2xl transition text-lg mb-2">
                  Ho capito → <span className="text-xs opacity-60 ml-1">↵</span>
                </button>
                <button onClick={onSegnalaErrore} className="w-full text-xs text-slate-600 hover:text-amber-500 transition py-1">⚠️ Segnala errore</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── App ───────────────────────────────────────────────────────────────────
    function App(){
      const [vocabolario,setVocabolario]=useState(()=>caricaVocabolario());
      const [stats,setStats]           =useState(()=>loadJSON(SK_STATS,{}));
      const [lingue,setLingue]         =useState(()=>loadJSON(SK_LINGUE,LINGUE_DEFAULT));
      const [filtri,setFiltri]         =useState(()=>loadJSON(SK_FILTRI,{temi:[],livelli:[]}));
      const [schermata,setSchermata]   =useState("home");
      const [modalita,setModalita]     =useState("quiz");
      const [carte,setCarte]           =useState([]);
      const [indice,setIndice]         =useState(0);
      const [input,setInput]           =useState("");
      const [stato,setStato]           =useState("domanda");
      const [punteggio,setPunteggio]   =useState({giusti:0,sbagliati:0});
      const [fine,setFine]             =useState(false);
      const [nuoveApprese,setNuoveApprese]=useState([]);
      const [segnalando,setSegnalando] =useState(false);
      const [configurando,setConfigurando]=useState(false);
      const [modalitaInAttesa,setModalitaInAttesa]=useState(null);
      const [linguaDaUsata,setLinguaDaUsata]=useState(null);
      const [linguaAUsata,setLinguaAUsata]=useState(null);

      useEffect(()=>{saveJSON(SK_VOC,vocabolario);},[vocabolario]);
      useEffect(()=>{saveJSON(SK_STATS,stats);},[stats]);
      useEffect(()=>{saveJSON(SK_LINGUE,lingue);},[lingue]);
      useEffect(()=>{saveJSON(SK_FILTRI,filtri);},[filtri]);

      function avvia(voc,st,mod,ling,fil,linguaDa,linguaA){
        const v=voc||vocabolario,s=st||stats,m=mod||modalita,lg=ling||lingue,f=fil||filtri;
        let da=linguaDa!==undefined?linguaDa:linguaDaUsata;
        let a=linguaA!==undefined?linguaA:linguaAUsata;
        // Dettato: estrai carte con da===a (stessa lingua)
        if(m==="dettato"){
          const carte=estraiCarteDettato(v,s,lg,f,da);
          setLinguaDaUsata(da); setLinguaAUsata(da);
          setCarte(carte);
        } else {
          setLinguaDaUsata(da); setLinguaAUsata(a);
          setCarte(estraiCarte(v,s,lg,f,da,a));
        }
        setIndice(0);setInput("");setStato("domanda");
        setPunteggio({giusti:0,sbagliati:0});setFine(false);setNuoveApprese([]);
        setSchermata("quiz");
      }

      function scegli(mod){
        setModalita(mod);
        setModalitaInAttesa(mod);
        setConfigurando(true);
      }
      function aggiungiParola(e){setVocabolario(v=>[...v,e]);setSchermata("home");}
      function eliminaParola(i){setVocabolario(v=>v.filter((_,idx)=>idx!==i));}
      function modificaParola(idx,nuova){setVocabolario(v=>v.map((e,i)=>i===idx?nuova:e));}

      function verificaRisposta(risposta){
        const carta=carte[indice];
        const atteso=carta.tipo==="coniugazione" ? carta.atteso : carta.entry[carta.a];
        const ok=isCorretta(atteso,risposta);
        const ns=aggiornaStatsCoppia(stats,carta.key,ok);
        setStats(ns);setInput(risposta);
        if(ok&&carta.tipo!=="coniugazione"&&carta.tipo!=="dettato"&&parolaAppresa(carta.entry,ns,lingue)){
          const k=wordKey(carta.entry);
          setNuoveApprese(p=>p.includes(k)?p:[...p,k]);
        }
        setStato(ok?"corretto":"sbagliato");
        setPunteggio(p=>({giusti:p.giusti+(ok?1:0),sbagliati:p.sbagliati+(ok?0:1)}));
        // Pronuncia automatica della risposta corretta
        const lA = carta.tipo==="coniugazione" ? carta.lA : lingue.find(l=>l.codice===carta.a);
        if(lA && atteso) setTimeout(()=>parla(atteso, lA.bcp47), 300);
      }

      function salta(){
        const carta=carte[indice];let nc=[...carte];
        if(!carta._saltata)nc.push({...carta,_saltata:true});
        if(indice+1>=nc.length){setCarte(nc);setFine(true);}
        else{setCarte(nc);setIndice(i=>i+1);setInput("");setStato("domanda");}
      }

      function nonLoSo(){
        const carta=carte[indice];
        const ns=aggiornaStatsCoppia(stats,carta.key,false);
        setStats(ns);setInput("—");setStato("sbagliato");
        setPunteggio(p=>({...p,sbagliati:p.sbagliati+1}));
      }

      function avanti(){
        const ok=stato==="corretto";let nc=[...carte];
        if(!ok&&modalita==="allenamento"){const c=carte[indice];if(!c._rimessa)nc.push({...c,_rimessa:true});}
        if(indice+1>=nc.length){setCarte(nc);setFine(true);}
        else{setCarte(nc);setIndice(i=>i+1);setInput("");setStato("domanda");}
      }

      function handleEsporta(){esportaProgressi(stats,vocabolario,lingue);}
      function handleImporta(file){
        importaProgressi(file,data=>{
          if(data.stats){
            const merged={...stats};
            Object.entries(data.stats).forEach(([k,val])=>{
              if(val&&typeof val.livello!=="undefined"){if(!merged[k]||val.livello>(merged[k].livello||0))merged[k]=val;}
            });
            setStats(merged);saveJSON(SK_STATS,merged);
          }
          if(data.vocabolario){
            const chiavi=new Set(vocabolario.map(wordKey));
            const nuove=data.vocabolario.filter(e=>!chiavi.has(wordKey(e)));
            const vu=[...vocabolario,...nuove];setVocabolario(vu);saveJSON(SK_VOC,vu);
          }
          if(data.lingue){
            const cc=new Set(lingue.map(l=>l.codice));
            const nl=data.lingue.filter(l=>!cc.has(l.codice));
            const lu=[...lingue,...nl];setLingue(lu);saveJSON(SK_LINGUE,lu);
          }
          alert("Progressi uniti!");
        });
      }

      if(configurando) return <ConfigurazioneQuiz
        modalita={modalitaInAttesa} lingue={lingue} filtri={filtri}
        vocabolario={vocabolario} stats={stats}
        onAvvia={(da,a)=>{setConfigurando(false);avvia(vocabolario,stats,modalitaInAttesa,lingue,filtri,da,a);}}
        onAnnulla={()=>setConfigurando(false)}/>;

      if(schermata==="home") return <Home vocabolario={vocabolario} stats={stats} lingue={lingue} filtri={filtri}
        onScegli={scegli} onVocabolario={()=>setSchermata("vocabolario")}
        onVerbi={()=>setSchermata("verbi")}
        onAggiungi={()=>setSchermata("aggiungi")}
        onEsporta={handleEsporta} onImporta={handleImporta}
        onCambiaLingue={nl=>{setLingue(nl);saveJSON(SK_LINGUE,nl);}}
        onCambiaFiltri={f=>{setFiltri(f);saveJSON(SK_FILTRI,f);}}/>;
      if(schermata==="aggiungi") return <FormAggiunta vocabolario={vocabolario} lingue={lingue} onSalva={aggiungiParola} onAnnulla={()=>setSchermata("home")}/>;
      if(schermata==="vocabolario") return <Vocabolario vocabolario={vocabolario} stats={stats} lingue={lingue} onElimina={eliminaParola} onModifica={modificaParola} onIndietro={()=>setSchermata("home")}/>;
      if(schermata==="verbi") return <SchermataVerbi lingue={lingue} stats={stats} onIndietro={()=>setSchermata("home")}/>;

      const cartaCorrente=carte[indice];
      return(
        <>
          {segnalando&&cartaCorrente&&(
            <ModificaParola entry={cartaCorrente.entry} lingue={lingue}
              onSalva={form=>{
                const idx=vocabolario.findIndex(e=>wordKey(e)===wordKey(cartaCorrente.entry));
                if(idx>=0)modificaParola(idx,form);
                setSegnalando(false);
              }}
              onAnnulla={()=>setSegnalando(false)}/>
          )}
          <SchermataQuiz
            carta={cartaCorrente} indice={indice} totale={carte.length}
            punteggio={punteggio} stato={stato} input={input} setInput={setInput}
            modalita={modalita} stats={stats} lingue={lingue}
            onVerifica={verificaRisposta} onAvanti={avanti}
            onSalta={salta} onNonLoSo={nonLoSo}
            onSegnalaErrore={()=>setSegnalando(true)}
            onHome={()=>setSchermata("home")}
            nuoveApprese={nuoveApprese} fine={fine}
            onAvviaAncora={()=>avvia(vocabolario,stats,modalita,lingue,filtri,linguaDaUsata,linguaAUsata)}/>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
