<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>LinguaeQuiz – Learn Languages with Spaced Repetition</title>
  <meta name="description" content="Free multilingual vocabulary quiz with spaced repetition. Practice 15+ languages." />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50:'#f0f9ff',500:'#0ea5e9',600:'#0284c7' },
            secondary:{ 500:'#d99e0a' },
          },
          borderRadius: { '4xl':'2rem' },
        }
      }
    }
  </script>
  <style>
    body { font-family: ui-sans-serif, system-ui, sans-serif; background:#000; color:#e2e8f0; -webkit-font-smoothing: antialiased; }
    input[type="text"] { background:#111; color:#e2e8f0; border-color:#333; }
    input[type="text"]:focus { border-color:#0ea5e9; outline: none; box-shadow: 0 0 0 3px rgba(14,165,233,0.4); }
    .card { background:#111; border-radius:1.5rem; border:1px solid #222; box-shadow:0 10px 30px rgba(0,0,0,0.6); }
    ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-thumb { background:#333; border-radius:3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ── CONFIGURAZIONE E COSTANTI ──────────────────────────────────────────
    const QUIZ_LEN = 10;
    const INTERVALLI = [0, 1, 3, 7];
    const SOGLIA_APPRESA = INTERVALLI.length - 1;

    const UI = {
      it: {
        lingue:"Lingue", filtri:"Filtri", vocabolario:"Vocabolario", verbi:"Tabelle verbi", 
        aggiungi:"Aggiungi parola", statistiche:"Statistiche", esporta:"Esporta", importa:"Importa",
        modalita:"Modalità", inizia:"Inizia", configura:"Configurazione", quiz:"🎯 Quiz", 
        allenamento:"🏋️ Allenamento", ascolto:"🎧 Ascolta e scrivi", voce:"🎤 Risposta vocale",
        dettato:"✍️ Dettato", nonstop:"⚡ Non-stop", conferma:"Conferma risposta", 
        salta:"⏭ Salta", nonloso:"💡 Non lo so", continua:"Continua →", hocapito:"Ho capito →",
        ottimo:"Eccellente!", sessione:"Sessione completata", corrette:"Corrette", errori:"Errori",
        precisione:"Precisione", paroleapprese:"Nuove parole apprese", tornaalmenu:"← Torna al menu",
        recordnonstop:"⚡ Record Non-stop", coppiedaripassare:"coppie da ripassare", oradel:"È ora del ripasso!",
        scrivi:"Scrivi in", nuovorecord:"Nuovo record!", configurazionetxt:"Configurazione",
        lingueattive:"Lingue attive", livello:"Livello", tema:"Tema", ndomande:"N. domande",
        illimitato:"Illimitato", riascolta:"🔊 Riascolta", homebtn:"Home", ancorabtn:"Ancora",
        trainer:"Il tuo trainer linguistico", paroleappresasu:"Parole apprese su", sceglimodo:"Scegli la modalità",
        paroletotali:"Parole totali", progressiuniti:"Progressi uniti!", nota_verbi_en:"ℹ️ I verbi inglesi non includono \"to\" (es. \"go\")"
      },
      en: {
        lingue:"Languages", filtri:"Filters", vocabolario:"Vocabulary", verbi:"Verb tables",
        aggiungi:"Add word", statistiche:"Statistics", esporta:"Export", importa:"Import",
        modalita:"Mode", inizia:"Start", configura:"Configuration", quiz:"🎯 Quiz",
        allenamento:"🏋️ Training", ascolto:"🎧 Listen & Write", voce:"🎤 Voice answer",
        dettato:"✍️ Dictation", nonstop:"⚡ Non-stop", conferma:"Confirm",
        salta:"⏭ Skip", nonloso:"💡 Don't know", continua:"Continue →", hocapito:"Got it →",
        ottimo:"Excellent!", sessione:"Session completed", corrette:"Correct", errori:"Errors",
        precisione:"Accuracy", paroleapprese:"New words learned", tornaalmenu:"← Back to menu",
        recordnonstop:"⚡ Non-stop Record", coppiedaripassare:"pairs to review", oradel:"Time to review!",
        scrivi:"Write in", nuovorecord:"New record!", configurazionetxt:"Configuration",
        lingueattive:"Active languages", livello:"Level", tema:"Theme", ndomande:"Questions",
        illimitato:"Unlimited", riascolta:"🔊 Listen again", homebtn:"Home", ancorabtn:"Again",
        trainer:"Your language trainer", paroleappresasu:"Words learned out of", sceglimodo:"Choose mode",
        paroletotali:"Total words", progressiuniti:"Progress merged!", nota_verbi_en:"ℹ️ English verbs do not include \"to\" (e.g. \"go\")"
      }
    };

    const BCP47_MAP = { "italiano":"it-IT","inglese":"en-GB","francese":"fr-FR","spagnolo":"es-ES","portoghese":"pt-PT","tedesco":"de-DE","latino":"la","greco antico":"el-GR" };
    function getBCP47(nome) { return BCP47_MAP[nome.toLowerCase()] || "it-IT"; }

    const LINGUE_DEFAULT = [
      { codice:"it", nome:"Italiano", bandiera:"🇮🇹", bcp47:"it-IT", attiva:true },
      { codice:"en", nome:"Inglese", bandiera:"🇬🇧", bcp47:"en-GB", attiva:true },
      { codice:"fr", nome:"Francese", bandiera:"🇫🇷", bcp47:"fr-FR", attiva:true },
      { codice:"es", nome:"Spagnolo", bandiera:"🇪🇸", bcp47:"es-ES", attiva:true },
      { codice:"pt", nome:"Portoghese", bandiera:"🇵🇹", bcp47:"pt-PT", attiva:true },
      { codice:"de", nome:"Tedesco", bandiera:"🇩🇪", bcp47:"de-DE", attiva:true },
      { codice:"la", nome:"Latino", bandiera:"🏛", bcp47:"la", attiva:true },
      { codice:"ia", nome:"Interlingua", bandiera:"🌐", bcp47:"ia", attiva:true },
      { codice:"sp", nome:"Spezzino", bandiera:"⚓", bcp47:"it-IT", attiva:false },
      { codice:"cr", nome:"Carrarino", bandiera:"🪨", bcp47:"it-IT", attiva:false }
    ];

    const VOCABOLARIO_DEFAULT = [
      { tema:"famiglia", livello:"A1", it:"madre", en:"mother", fr:"mère", es:"madre", de:"Mutter", pt:"mãe", la:"mater", ia:"matre", sp:"mae" },
      { tema:"famiglia", livello:"A1", it:"padre", en:"father", fr:"père", es:"padre", de:"Vater", pt:"pai", la:"pater", ia:"patre", sp:"pae" },
      { tema:"natura", livello:"A1", it:"acqua", en:"water", fr:"eau", es:"agua", de:"Wasser", pt:"água", la:"aqua", ia:"aqua", sp:"eva" },
      { tema:"cibo", livello:"A1", it:"pane", en:"bread", fr:"pain", es:"pan", de:"Brot", pt:"pão", la:"panis", ia:"pan", sp:"pan" }
    ];

    // ── STORAGE UTILS ──────────────────────────────────────────────────────
    const saveJSON = (k, v) => localStorage.setItem(k, JSON.stringify(v));
    const loadJSON = (k, def) => { try { const s = localStorage.getItem(k); return s ? JSON.parse(s) : def; } catch { return def; } };

    // ── LOGICA CORE ────────────────────────────────────────────────────────
    function normalizza(str) { 
      if(!str) return "";
      return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z\s]/g,"").trim(); 
    }
    
    function normalizzaEn(str) {
      const n = normalizza(str);
      return n.startsWith("to ") ? n.slice(3) : n;
    }

    function isCorretta(atteso, dato, bcp47) {
      const isEn = bcp47 && bcp47.startsWith("en");
      const n = isEn ? normalizzaEn(dato) : normalizza(dato);
      if(!n) return false;
      const ops = atteso.split("/").map(s => isEn ? normalizzaEn(s) : normalizza(s));
      return ops.some(op => op === n || (op.length > 3 && (op.startsWith(n) || n.startsWith(op))));
    }

    function wordKey(e) { return e.it || e.en || "word"; }
    function coppiaKey(e, da, a) { return `${wordKey(e)}__${da}__${a}`; }
    function getUILang() { return localStorage.getItem("linguaUI") || "it"; }

    function estraiCarte(voc, stats, lingue, filtri, daFissa, aFissa, nonstop) {
      const pool = voc.filter(e => {
        if(filtri.temi.length && !filtri.temi.includes(e.tema)) return false;
        if(filtri.livelli.length && !filtri.livelli.includes(e.livello)) return false;
        return true;
      });
      
      let carte = [];
      pool.forEach(e => {
        const attive = lingue.filter(l => l.attiva && e[l.codice]).map(l => l.codice);
        attive.forEach(da => attive.forEach(a => {
          if(da === a) return;
          if(daFissa && da !== daFissa) return;
          if(aFissa && a !== aFissa) return;
          carte.push({ entry: e, da, a, key: coppiaKey(e, da, a) });
        }));
      });
      return carte.sort(() => Math.random() - 0.5).slice(0, nonstop ? 999 : QUIZ_LEN);
    }

    // ── COMPONENTI ─────────────────────────────────────────────────────────
    function BarraProgresso({valore, max}) {
      return (
        <div className="w-full bg-zinc-800 rounded-full h-2 mb-4">
          <div className="bg-sky-500 h-full rounded-full transition-all" style={{width:`${(valore/max)*100}%`}}></div>
        </div>
      );
    }

    function App() {
      const [vocabolario, setVocabolario] = useState(() => loadJSON("q_voc", VOCABOLARIO_DEFAULT));
      const [stats, setStats] = useState(() => loadJSON("q_stats", {}));
      const [lingue, setLingue] = useState(() => loadJSON("q_lingue", LINGUE_DEFAULT));
      const [schermata, setSchermata] = useState("home");
      const [carte, setCarte] = useState([]);
      const [indice, setIndice] = useState(0);
      const [input, setInput] = useState("");
      const [stato, setStato] = useState("domanda"); // domanda, corretto, sbagliato
      
      const t = UI[getUILang()];

      useEffect(() => { saveJSON("q_voc", vocabolario); }, [vocabolario]);
      useEffect(() => { saveJSON("q_stats", stats); }, [stats]);

      const avvia = (mod) => {
        const nuove = estraiCarte(vocabolario, stats, lingue, {temi:[], livelli:[]}, null, null, mod === "nonstop");
        if(!nuove.length) return alert("Nessuna parola disponibile!");
        setCarte(nuove);
        setIndice(0);
        setStato("domanda");
        setSchermata("quiz");
      };

      const verifica = () => {
        const c = carte[indice];
        const ok = isCorretta(c.entry[c.a], input, lingue.find(l=>l.codice===c.a)?.bcp47);
        setStato(ok ? "corretto" : "sbagliato");
        const k = c.key;
        const cur = stats[k] || { livello: 0 };
        setStats({ ...stats, [k]: { livello: ok ? Math.min(cur.livello + 1, 3) : 0 } });
      };

      if(schermata === "home") return (
        <div className="min-h-screen flex flex-col items-center justify-center p-6">
          <h1 className="text-5xl font-black text-sky-500 mb-2">LinguaeQuiz</h1>
          <p className="text-zinc-500 mb-10">{t.trainer}</p>
          <div className="grid gap-4 w-full max-w-xs">
            <button onClick={() => avvia("quiz")} className="bg-sky-600 hover:bg-sky-500 p-4 rounded-2xl font-bold text-xl transition">{t.quiz}</button>
            <button onClick={() => avvia("nonstop")} className="bg-zinc-800 hover:bg-zinc-700 p-4 rounded-2xl font-bold text-xl transition">{t.nonstop}</button>
          </div>
          <div className="mt-10 flex gap-4">
             <button onClick={() => { setUILang(getUILang() === "it" ? "en" : "it"); }} className="text-zinc-600 text-sm underline">🇮🇹/🇬🇧 Change Language</button>
          </div>
        </div>
      );

      if(schermata === "quiz") {
        const c = carte[indice];
        const lDa = lingue.find(l => l.codice === c.da);
        const lA = lingue.find(l => l.codice === c.a);

        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="card p-8 w-full max-w-md">
              <div className="flex justify-between text-zinc-600 text-xs mb-4">
                <span>{indice + 1} / {carte.length}</span>
                <button onClick={() => setSchermata("home")}>ESC ✕</button>
              </div>
              <BarraProgresso valore={indice} max={carte.length} />
              
              <div className="text-center my-10">
                <span className="text-zinc-500 text-sm uppercase tracking-widest">{lDa.nome}</span>
                <h2 className="text-4xl font-bold mt-2">{c.entry[c.da]}</h2>
              </div>

              {stato === "domanda" ? (
                <div className="space-y-4">
                  <input 
                    autoFocus type="text" value={input} 
                    onChange={e => setInput(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && verifica()}
                    className="w-full p-4 rounded-xl text-xl" 
                    placeholder={`${t.scrivi} ${lA.nome}...`}
                  />
                  <button onClick={verifica} className="w-full bg-sky-600 p-4 rounded-xl font-bold uppercase">{t.conferma}</button>
                </div>
              ) : (
                <div className="text-center space-y-6">
                  <div className={`p-6 rounded-2xl ${stato === 'corretto' ? 'bg-green-900/20 border border-green-500/50' : 'bg-red-900/20 border border-red-500/50'}`}>
                    <p className="text-sm text-zinc-400 mb-1">{stato === 'corretto' ? 'Ottimo!' : 'La risposta era:'}</p>
                    <p className="text-2xl font-bold">{c.entry[c.a]}</p>
                  </div>
                  <button 
                    autoFocus
                    onClick={() => {
                      if(indice + 1 < carte.length) { setIndice(indice + 1); setStato("domanda"); setInput(""); }
                      else { setSchermata("home"); }
                    }} 
                    className="w-full bg-white text-black p-4 rounded-xl font-bold uppercase"
                  >
                    {t.continua}
                  </button>
                </div>
              )}
            </div>
          </div>
        );
      }
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
