// Rileva lingua UI: localStorage > browser > fallback en
function detectUILang() {
  const saved = localStorage.getItem("linguaUI");
  if (saved) return saved;
  const browser = (navigator.language || navigator.userLanguage || "en").split("-")[0].toLowerCase();
  const supported = ["it", "en", "fr", "es", "de", "pt", "ru", "ca", "zh", "ko"];
  const detected = supported.includes(browser) ? browser : "en";
  localStorage.setItem("linguaUI", detected);
  return detected;
}
function useUI() {
  return UI[detectUILang()];
}
function getUILang() {
  return detectUILang();
}
function setUILang(lang) {
  localStorage.setItem("linguaUI", lang);
  window.location.reload();
}

// ── Storage ───────────────────────────────────────────────────────────────
const SK_VOC = "qml_v10_vocabolario";
const SK_STATS = "qml_v10_stats";
const SK_LINGUE = "qml_v10_lingue";
const SK_FILTRI = "qml_v10_filtri";
const SK_VOC_VER = "qml_v10_voc_version";
const SK_RECORD = "qml_v10_record";
const SK_RECORD_PERC = "qml_v10_record_perc";
const SK_STREAK = "qml_v10_streak"; // {lastDay: timestamp, count: n}
const SK_NDOM = "qml_v10_ndom"; // memoria n.domande per modalità
const SK_AI = "qml_v10_ai"; // impostazioni IA {provider, apiKey}

// Versione corrente del vocabolario — incrementa ad ogni aggiornamento
const VOC_VERSION = 24;

// Merge automatico: aggiunge voci mancanti dal default senza toccare i progressi
function mergeVocabolario(salvato) {
  // Strategia sicura: parti sempre dal VOCABOLARIO_DEFAULT aggiornato
  // e reintegra solo le voci personalizzate aggiunte dall'utente
  // (quelle che NON esistono nel default, riconoscibili perché non hanno chiave nel default)
  const chiaviDefault = new Set(VOCABOLARIO_DEFAULT.map(wordKey));
  // Mantieni solo le voci custom dell'utente (non presenti nel default)
  const vociCustom = Array.isArray(salvato) ? salvato.filter(e => e && typeof e === 'object' && !chiaviDefault.has(wordKey(e))) : [];
  const merged = [...VOCABOLARIO_DEFAULT, ...vociCustom];
  saveJSON(SK_VOC, merged);
  return merged;
}
function caricaVocabolario() {
  try {
    const verSalvata = loadJSON(SK_VOC_VER, 0);
    const salvato = loadJSON(SK_VOC, null);
    if (!salvato) {
      saveJSON(SK_VOC_VER, VOC_VERSION);
      return VOCABOLARIO_DEFAULT;
    }
    if (verSalvata < VOC_VERSION) {
      const aggiornato = mergeVocabolario(salvato);
      saveJSON(SK_VOC_VER, VOC_VERSION);
      return aggiornato;
    }
    if (!Array.isArray(salvato) || salvato.length === 0) throw new Error("voc_invalid");
    return salvato;
  } catch (e) {
    // localStorage corrotto — reset automatico
    console.warn("LinguaeQuiz: reset localStorage.", e);
    try {
      localStorage.clear();
    } catch (_) {}
    saveJSON(SK_VOC_VER, VOC_VERSION);
    return VOCABOLARIO_DEFAULT;
  }
}
function loadJSON(key, def) {
  try {
    const s = localStorage.getItem(key);
    return s ? JSON.parse(s) : def;
  } catch {
    return def;
  }
}
function saveJSON(key, val) {
  try {
    localStorage.setItem(key, JSON.stringify(val));
  } catch {}
}
function esportaProgressi(stats, vocabolario, lingue) {
  const ai = (() => {
    try {
      return JSON.parse(localStorage.getItem("qml_v10_ai") || "null");
    } catch {
      return null;
    }
  })();
  const streak = (() => {
    try {
      return JSON.parse(localStorage.getItem("qml_v10_streak") || "null");
    } catch {
      return null;
    }
  })();
  const recordPerc = (() => {
    try {
      return JSON.parse(localStorage.getItem("qml_v10_record_perc") || "null");
    } catch {
      return null;
    }
  })();
  const ndom = (() => {
    try {
      return JSON.parse(localStorage.getItem("qml_v10_ndom") || "null");
    } catch {
      return null;
    }
  })();
  const blob = new Blob([JSON.stringify({
    stats,
    vocabolario,
    lingue,
    ai,
    streak,
    recordPerc,
    ndom
  }, null, 2)], {
    type: "application/json"
  });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "quiz_progressi.json";
  a.click();
  URL.revokeObjectURL(a.href);
}
function importaProgressi(file, onDone) {
  const r = new FileReader();
  r.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      // Restore optional fields to localStorage
      if (data.ai) try {
        localStorage.setItem("qml_v10_ai", JSON.stringify(data.ai));
      } catch {}
      if (data.streak) try {
        localStorage.setItem("qml_v10_streak", JSON.stringify(data.streak));
      } catch {}
      if (data.recordPerc) try {
        localStorage.setItem("qml_v10_record_perc", JSON.stringify(data.recordPerc));
      } catch {}
      if (data.ndom) try {
        localStorage.setItem("qml_v10_ndom", JSON.stringify(data.ndom));
      } catch {}
      onDone(data);
    } catch {
      alert(UI[localStorage.getItem("linguaUI") || "en"].filenonvalido);
    }
  };
  r.readAsText(file);
}

// ── Ripetizione spaziata ──────────────────────────────────────────────────
function wordKey(entry) {
  return entry.it || entry.en || Object.values(entry).find(v => typeof v === "string" && v.trim());
}
function coppiaKey(entry, da, a) {
  return wordKey(entry) + "__" + da + "__" + a;
}
function oggi() {
  const d = new Date();
  return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
}
function getCoppia(stats, key) {
  return stats[key] || {
    livello: 0,
    prossima: 0
  };
}
function isScaduta(stats, key) {
  const c = getCoppia(stats, key);
  return c.livello > 0 && oggi() >= c.prossima;
}
function isAppresa(stats, key) {
  return getCoppia(stats, key).livello >= SOGLIA_APPRESA;
}
function aggiornaStatsCoppia(stats, key, corretto) {
  const c = getCoppia(stats, key);
  // SM-2: risposta giusta avanza, sbagliata riporta a livello 1 (non 0, per non cancellare tutto)
  const nl = corretto ? Math.min(c.livello + 1, LIVELLO_MAX) : Math.max(0, Math.min(c.livello - 2, 1));
  const giorniAttesa = corretto ? INTERVALLI[nl] : 0;
  return {
    ...stats,
    [key]: {
      livello: nl,
      prossima: oggi() + giorniAttesa * 86400000,
      risposte: (c.risposte || 0) + 1,
      corrette: (c.corrette || 0) + (corretto ? 1 : 0)
    }
  };
}
function labelProssima(stats, key) {
  const c = getCoppia(stats, key);
  if (c.livello === 0) return "Nuova";
  const d = Math.round((c.prossima - oggi()) / 86400000);
  const ui2 = UI[localStorage.getItem("linguaUI") || "en"];
  if (d <= 0) return ui2.oggi;
  if (d === 1) return ui2.domani;
  return `+${d}g`;
}
function lingueAttiveEntry(entry, lingue) {
  return lingue.filter(l => l.attiva && entry[l.codice] && entry[l.codice].trim() !== "").map(l => l.codice);
}
function parolaAppresa(entry, stats, lingue) {
  const ld = lingueAttiveEntry(entry, lingue);
  if (ld.length < 2) return false;
  const coppie = [];
  ld.forEach(da => ld.forEach(a => {
    if (da !== a) coppie.push(coppiaKey(entry, da, a));
  }));
  if (coppie.length === 0) return false;
  const apprese = coppie.filter(k => isAppresa(stats, k)).length;
  return apprese / coppie.length >= 0.75;
}
function contaScadute(vocabolario, stats, lingue, filtri) {
  let n = 0;
  vocabolario.filter(e => passaFiltri(e, filtri)).forEach(e => {
    const ld = lingueAttiveEntry(e, lingue);
    ld.forEach(da => ld.forEach(a => {
      if (da !== a && isScaduta(stats, coppiaKey(e, da, a))) n++;
    }));
  });
  return n;
}
function passaFiltri(entry, filtri) {
  if (filtri.temi.length > 0 && !filtri.temi.includes(entry.tema || "")) return false;
  if (filtri.livelli.length > 0 && !filtri.livelli.includes(entry.livello || "A1")) return false;
  return true;
}
function estraiCarte(vocabolario, stats, lingue, filtri, linguaDaFissa, linguaAFissa, nonstop = false) {
  const lingueAttive = lingue.filter(l => l.attiva);
  const limite = nonstop ? 9999 : QUIZ_LEN;
  const modalitaNS = ["quiz", "allenamento", "ascolto"];
  const pool = vocabolario.filter(e => passaFiltri(e, filtri));
  const sc = [],
    nu = [],
    ap = [];

  // ── Stima livello utente (media dei livelli SM-2 sulle parole viste) ──
  const livelliVisti = Object.values(stats).map(s => s.livello || 0).filter(l => l > 0);
  const livelloUtente = livelliVisti.length > 0 ? livelliVisti.reduce((a, b) => a + b, 0) / livelliVisti.length : 0;
  // Soglia CEFR adattiva: all'inizio solo A1, poi A1+A2, poi tutto
  const cefrMax = livelloUtente < 1 ? "A1" : livelloUtente < 2 ? "A2" : livelloUtente < 4 ? "B1" : "B2";
  const cefrOrdine = ["A1", "A2", "B1", "B2"];
  const cefrIdx = cefrOrdine.indexOf(cefrMax);
  function passaCEFR(e) {
    return cefrOrdine.indexOf(e.livello || "A1") <= cefrIdx;
  }

  // ── Parole normali ───────────────────────────────────────────────────
  pool.forEach(e => {
    const ld = lingueAttiveEntry(e, lingue);
    if (ld.length < 2) return;
    const daList = linguaDaFissa ? ld.filter(c => c === linguaDaFissa) : ld;
    const aList = linguaAFissa ? ld.filter(c => c === linguaAFissa) : ld;
    daList.forEach(da => aList.forEach(a => {
      if (da === a) return;
      const key = coppiaKey(e, da, a);
      const c = getCoppia(stats, key);
      const adatta = passaCEFR(e);

function generaEserciziConiugazioni(lingueAttive) {
  const esercizi = [];
  // Filtra solo le lingue supportate nelle coniugazioni e attive
  const lingConiug = lingueAttive.filter(l => LINGUE_CONIUG[l.codice]);
  Object.entries(CONIUGAZIONI).forEach(([verbKey, verbo]) => {
    Object.entries(verbo.tempi).forEach(([tempoKey, tempo]) => {
      tempo.forme.forEach(forma => {
        lingConiug.forEach(lDA => {
          if (!forma[lDA.codice]) return;
          lingConiug.forEach(lA => {
            if (lA.codice === lDA.codice || !forma[lA.codice]) return;
            const key = `coniug__${verbKey}__${tempoKey}__${forma.p}__${lDA.codice}__${lA.codice}`;
            esercizi.push({
              key,
              tipo: "coniugazione",
              atteso: forma[lA.codice],
              lDA,
              lA,
              verbKey,
              tempoKey,
              persona: forma.p,
              entry: {
                [lDA.codice]: forma[lDA.codice],
                [lA.codice]: forma[lA.codice]
              }
            });
          });
        });
      });
    });
  });
  return esercizi;
}
