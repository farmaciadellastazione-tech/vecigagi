    const VOC_VERSION = 20;

    function mergeVocabolario(salvato) {
      const chiavi = new Set(salvato.map(wordKey));
      const nuove = VOCABOLARIO_DEFAULT.filter(e => !chiavi.has(wordKey(e)));
      if (nuove.length === 0) return salvato;
      const merged = [...salvato, ...nuove];
      saveJSON(SK_VOC, merged);
      return merged;
    }

    function caricaVocabolario() {
      const verSalvata = loadJSON(SK_VOC_VER, 0);
      const salvato = loadJSON(SK_VOC, null);
      if (!salvato) {
        saveJSON(SK_VOC_VER, VOC_VERSION);
        return VOCABOLARIO_DEFAULT;
      }
      if (verSalvata < VOC_VERSION) {
        const aggiornato = mergeVocabolario(salvato);
        saveJSON(SK_VOC_VER, VOC_VERSION);
        return aggiornato;
      }
      return salvato;
    }

    function loadJSON(key,def){try{const s=localStorage.getItem(key);return s?JSON.parse(s):def;}catch{return def;}}
    function saveJSON(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch{}}

    function wordKey(entry){return entry.it||entry.en||Object.values(entry).find(v=>typeof v==="string"&&v.trim());}
    function coppiaKey(entry,da,a){return wordKey(entry)+"__"+da+"__"+a;}
    function oggi(){const d=new Date();return new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();}
    function getCoppia(stats,key){return stats[key]||{livello:0,prossima:0};}
    function isScaduta(stats,key){return oggi()>=getCoppia(stats,key).prossima;}
    function isAppresa(stats,key){return getCoppia(stats,key).livello>=SOGLIA_APPRESA;}

    function aggiornaStatsCoppia(stats,key,corretto){
      const c=getCoppia(stats,key);
      const nl=corretto?Math.min(c.livello+1,SOGLIA_APPRESA):0;
      return {...stats,[key]:{livello:nl,prossima:corretto?oggi()+INTERVALLI[nl]*86400000:oggi()}};
    }
    function labelProssima(stats,key){
      const c=getCoppia(stats,key);if(c.livello===0)return"Nuova";
      const d=Math.round((c.prossima-oggi())/86400000);
      const ui2=UI[localStorage.getItem("linguaUI")||"en"];if(d<=0)return ui2.oggi;if(d===1)return ui2.domani;return`+${d}g`;
    }

    function passaFiltri(entry,filtri){
      if(filtri.temi.length>0&&!filtri.temi.includes(entry.tema||"")) return false;
      if(filtri.livelli.length>0&&!filtri.livelli.includes(entry.livello||"A1")) return false;
      return true;
    }

    function estraiCarte(vocabolario,stats,lingue,filtri,linguaDaFissa,linguaAFissa,nonstop=false){
      const limite=nonstop?9999:QUIZ_LEN;
      const modalitaNS=["quiz","allenamento","ascolto"];
      const pool=vocabolario.filter(e=>passaFiltri(e,filtri));
      const sc=[],nu=[],ap=[];

      pool.forEach(e=>{
        const ld=lingue.filter(l=>l.attiva&&e[l.codice]).map(l=>l.codice);
        if(ld.length<2)return;
        const daList=linguaDaFissa?ld.filter(c=>c===linguaDaFissa):ld;
        const aList=linguaAFissa?ld.filter(c=>c===linguaAFissa):ld;
        daList.forEach(da=>aList.forEach(a=>{
          if(da===a)return;
          const key=coppiaKey(e,da,a);const c=getCoppia(stats,key);
          const carta={entry:e,da,a,key,sottomodalita:nonstop?modalitaNS[Math.floor(Math.random()*modalitaNS.length)]:null};
          if(c.livello===0)nu.push(carta);
          else if(isScaduta(stats,key))sc.push(carta);
          else if(isAppresa(stats,key)&&Math.random()<0.05)ap.push(carta);
        }));
      });

      [sc,nu,ap].forEach(g=>g.sort(()=>Math.random()-0.5));
      const res=[],usate=new Set();
      for(const g of[sc,nu,ap]){
        for(const c of g){
          if(res.length>=limite)break;
          if(!usate.has(c.key)){res.push(c);usate.add(c.key);}
        }
      }
      return res;
    }

    function parla(testo,bcp47){
      if(!window.speechSynthesis||!bcp47)return;
      window.speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(testo.replace(/\(.*?\)/g,"").replace(/\/.*/,"").trim());
      u.lang=bcp47;u.rate=0.85;window.speechSynthesis.speak(u);
    }

    function normalizza(str){
      return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[-_]/g," ").replace(/[^a-z\s]/g,"").replace(/\s+/g," ").trim();
    }

    function normalizzaEn(str){
      const n=normalizza(str);
      return n.startsWith("to ") ? n.slice(3) : n;
    }

    function isCorretta(atteso, dato, bcp47) {
      const isEn = bcp47 && bcp47.startsWith("en");
      const n = isEn ? normalizzaEn(dato) : normalizza(dato);
      if(!n) return false;
      const ops = atteso.split("/").map(s => isEn ? normalizzaEn(s) : normalizza(s));
      return ops.some(op => op === n || op.startsWith(n) || n.startsWith(op));
    }

    // --- Componenti UI ---

    function BarraProgresso({valore,max}){
      return(<div className="w-full bg-zinc-900 rounded-full h-2.5 overflow-hidden">
        <div className="bg-sky-500 h-full transition-all duration-300" style={{width:`${Math.min(100,max>0?(valore/max)*100:0)}%`}}/>
      </div>);
    }

    function App(){
      const [vocabolario,setVocabolario]=useState(()=>caricaVocabolario());
      const [stats,setStats]           =useState(()=>loadJSON(SK_STATS,{}));
      const [lingue,setLingue]         =useState(()=>loadJSON(SK_LINGUE,LINGUE_DEFAULT));
      const [filtri,setFiltri]         =useState(()=>loadJSON(SK_FILTRI,{temi:[],livelli:[]}));
      const [schermata,setSchermata]   =useState("home");
      const [modalita,setModalita]     =useState("quiz");
      const [carte,setCarte]           =useState([]);
      const [indice,setIndice]         =useState(0);
      const [input,setInput]           =useState("");
      const [stato,setStato]           =useState("domanda");
      const [punteggio,setPunteggio]   =useState({giusti:0,sbagliati:0});

      useEffect(()=>{saveJSON(SK_VOC,vocabolario);},[vocabolario]);
      useEffect(()=>{saveJSON(SK_STATS,stats);},[stats]);
      useEffect(()=>{saveJSON(SK_LINGUE,lingue);},[lingue]);

      function avviaQuiz(mod){
        const c = estraiCarte(vocabolario, stats, lingue, filtri, null, null, mod==="nonstop");
        if(c.length === 0) { alert("Nessuna parola disponibile con i filtri attuali."); return; }
        setModalita(mod);
        setCarte(c);
        setIndice(0);
        setPunteggio({giusti:0,sbagliati:0});
        setStato("domanda");
        setSchermata("quiz");
      }

      function verifica(){
        const carta = carte[indice];
        const ok = isCorretta(carta.entry[carta.a], input, lingue.find(l=>l.codice===carta.a)?.bcp47);
        setStats(aggiornaStatsCoppia(stats, carta.key, ok));
        setStato(ok ? "corretto" : "sbagliato");
        setPunteggio(p => ({...p, [ok?"giusti":"sbagliati"]: p[ok?"giusti":"sbagliati"]+1}));
        if(ok) parla(carta.entry[carta.a], lingue.find(l=>l.codice===carta.a)?.bcp47);
      }

      function prossimo(){
        if(indice + 1 < carte.length) {
          setIndice(indice + 1);
          setInput("");
          setStato("domanda");
        } else {
          setSchermata("home");
        }
      }

      if(schermata === "home") return (
        <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-black">
          <h1 className="text-4xl font-bold mb-8 text-sky-500">LinguaeQuiz</h1>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full max-w-md">
            <button onClick={()=>avviaQuiz("quiz")} className="bg-sky-600 p-6 rounded-2xl font-bold hover:bg-sky-500 transition">🎯 Inizia Quiz</button>
            <button onClick={()=>avviaQuiz("nonstop")} className="bg-red-600 p-6 rounded-2xl font-bold hover:bg-red-500 transition">⚡ Non-stop</button>
          </div>
          <p className="mt-8 text-zinc-500 text-sm">Caricate {vocabolario.length} parole in {lingue.filter(l=>l.attiva).length} lingue.</p>
        </div>
      );

      if(schermata === "quiz") {
        const carta = carte[indice];
        const lDA = lingue.find(l=>l.codice===carta.da);
        const lA = lingue.find(l=>l.codice===carta.a);
        
        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-zinc-900">
            <div className="card p-8 w-full max-w-lg">
              <div className="flex justify-between text-xs text-zinc-500 mb-4">
                <span>PAROLA {indice+1} DI {carte.length}</span>
                <button onClick={()=>setSchermata("home")}>CHIUDI ✕</button>
              </div>
              <BarraProgresso valore={indice} max={carte.length} />
              
              <div className="my-8 text-center">
                <p className="text-zinc-500 text-sm mb-2">{lDA.bandiera} {lDA.nome}</p>
                <h2 className="text-4xl font-bold text-white mb-6">{carta.entry[carta.da]}</h2>
                <p className="text-zinc-500 text-sm">{lA.bandiera} TRADUCI IN {lA.nome.toUpperCase()}</p>
              </div>

              {stato === "domanda" ? (
                <div className="space-y-4">
                  <input autoFocus type="text" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&verifica()} className="w-full p-4 rounded-xl text-lg text-white border-2 border-zinc-700 focus:border-sky-500 outline-none" placeholder="Scrivi qui..." />
                  <button onClick={verifica} className="w-full bg-sky-500 p-4 rounded-xl font-bold text-lg">CONFERMA</button>
                </div>
              ) : (
                <div className={`p-6 rounded-xl text-center ${stato==="corretto"?"bg-green-900/30 border border-green-500":"bg-red-900/30 border border-red-500"}`}>
                  <p className="text-2xl mb-2">{stato==="corretto"?"Ottimo! ✅":"Sbagliato ❌"}</p>
                  <p className="text-zinc-400 text-sm mb-1">La risposta corretta era:</p>
                  <p className="text-white font-bold text-xl">{carta.entry[carta.a]}</p>
                  <button onClick={prossimo} className="mt-6 w-full bg-white text-black p-4 rounded-xl font-bold">CONTINUA →</button>
                </div>
              )}
            </div>
          </div>
        );
      }
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
